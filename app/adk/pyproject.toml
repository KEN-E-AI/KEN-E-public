[project]
name = "company-news-chatbot"
version = "0.1.0"
description = "Simple company news chatbot using ADK and Vertex AI Search"
requires-python = ">=3.10,<3.13"
dependencies = [
    "baml-py>=0.207.1",
    "google-adk>=1.26.0",
    "google-cloud-aiplatform>=1.140.0",
    "google-cloud-firestore>=2.23.0",
    "neo4j>=5.14.0",
    "newsapi-python>=0.2.7",
    "openai>=1.0.0",
    "pypdf2>=3.0.1",
    "python-dotenv",
    "requests>=2.32.4",
    "wandb>=0.22.2",
    "weave>=0.51.0,<0.51.57",
]

[dependency-groups]
dev = [
    "pytest-asyncio>=1.3.0",
]

