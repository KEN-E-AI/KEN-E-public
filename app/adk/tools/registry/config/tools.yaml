# Tool Registry Configuration
# Sprint 2 Scope: Google Analytics tools only
# Additional tools will be added in future sprints

tools:
  # ============================================================================
  # Google Analytics Tools
  # ============================================================================

  - name: list_ga_accounts
    description: List Google Analytics accounts and properties the user has access to
    category: analytics
    mcp_server: google_analytics_mcp
    parameters:
      - name: account_id
        type: string
        description: KEN-E account ID for credential lookup
        required: true
    permissions:
      - scope: analytics:read
        required: true
    keywords:
      - analytics
      - ga4
      - accounts
      - properties
      - list
      - google
    estimated_tokens: 150
    examples:
      - "List my GA accounts"
      - "Show me my analytics properties"
      - "What GA4 properties do I have access to?"

  - name: get_ga_property_details
    description: Get configuration details for a specific GA4 property including settings, data streams, and conversion events
    category: analytics
    mcp_server: google_analytics_mcp
    parameters:
      - name: property_id
        type: string
        description: GA4 property ID (e.g., "123456789")
        required: true
    permissions:
      - scope: analytics:read
        required: true
    keywords:
      - analytics
      - ga4
      - property
      - configuration
      - settings
      - details
    estimated_tokens: 180
    examples:
      - "Get details for property 123456789"
      - "Show me the configuration of my GA4 property"

  - name: query_ga_report
    description: Query Google Analytics for traffic, engagement, and conversion metrics with customizable date ranges and dimensions
    category: analytics
    mcp_server: google_analytics_mcp
    parameters:
      - name: property_id
        type: string
        description: GA4 property ID
        required: true
      - name: date_range
        type: object
        description: Start and end dates for the report (YYYY-MM-DD format)
        required: true
      - name: metrics
        type: array
        description: Metrics to retrieve (e.g., sessions, users, pageviews, conversions)
        required: true
      - name: dimensions
        type: array
        description: Dimensions to group by (e.g., date, source, medium, country)
        required: false
    permissions:
      - scope: analytics:read
        required: true
    keywords:
      - analytics
      - ga4
      - traffic
      - users
      - sessions
      - pageviews
      - report
      - metrics
      - data
      - performance
    estimated_tokens: 250
    examples:
      - "Show me website traffic for the last 30 days"
      - "What are my top traffic sources this month?"
      - "How many users visited my site last week?"

  - name: get_ga_realtime
    description: Get real-time analytics data including active users, current page views, and traffic sources
    category: analytics
    mcp_server: google_analytics_mcp
    parameters:
      - name: property_id
        type: string
        description: GA4 property ID
        required: true
      - name: metrics
        type: array
        description: Real-time metrics to retrieve (e.g., activeUsers, screenPageViews)
        required: false
        default: ["activeUsers"]
    permissions:
      - scope: analytics:read
        required: true
    keywords:
      - analytics
      - ga4
      - realtime
      - real-time
      - active
      - users
      - live
      - current
    estimated_tokens: 180
    examples:
      - "How many users are on my site right now?"
      - "Show me real-time traffic"
      - "What's the current activity on my website?"

  - name: compare_ga_periods
    description: Compare analytics metrics between two time periods to identify trends and changes
    category: analytics
    mcp_server: google_analytics_mcp
    parameters:
      - name: property_id
        type: string
        description: GA4 property ID
        required: true
      - name: current_period
        type: object
        description: Current period date range (start_date, end_date)
        required: true
      - name: comparison_period
        type: object
        description: Comparison period date range (start_date, end_date)
        required: true
      - name: metrics
        type: array
        description: Metrics to compare
        required: true
    permissions:
      - scope: analytics:read
        required: true
    keywords:
      - analytics
      - ga4
      - compare
      - comparison
      - trend
      - period
      - growth
      - change
      - performance
    estimated_tokens: 280
    examples:
      - "Compare traffic this month vs last month"
      - "How does this week's performance compare to last week?"
      - "Show me year-over-year growth"

  - name: get_ga_top_pages
    description: Get the top performing pages by page views, engagement, or conversions
    category: analytics
    mcp_server: google_analytics_mcp
    parameters:
      - name: property_id
        type: string
        description: GA4 property ID
        required: true
      - name: date_range
        type: object
        description: Date range for the report
        required: true
      - name: sort_by
        type: string
        description: Metric to sort by (pageViews, engagementRate, conversions)
        required: false
        default: pageViews
      - name: limit
        type: integer
        description: Number of pages to return
        required: false
        default: 10
    permissions:
      - scope: analytics:read
        required: true
    keywords:
      - analytics
      - ga4
      - pages
      - top
      - content
      - popular
      - best
      - performing
    estimated_tokens: 200
    examples:
      - "What are my top 10 pages?"
      - "Which content is most popular?"
      - "Show me best performing pages this month"

  - name: get_ga_audience
    description: Get audience demographics and interests including age, gender, location, and interests
    category: analytics
    mcp_server: google_analytics_mcp
    parameters:
      - name: property_id
        type: string
        description: GA4 property ID
        required: true
      - name: date_range
        type: object
        description: Date range for the report
        required: true
      - name: dimension
        type: string
        description: Audience dimension (age, gender, country, interests)
        required: true
    permissions:
      - scope: analytics:read
        required: true
    keywords:
      - analytics
      - ga4
      - audience
      - demographics
      - users
      - age
      - gender
      - location
      - interests
    estimated_tokens: 220
    examples:
      - "Who is my audience?"
      - "Show me user demographics"
      - "Where are my users located?"

  - name: get_ga_conversions
    description: Get conversion data including goals, events, and e-commerce transactions
    category: analytics
    mcp_server: google_analytics_mcp
    parameters:
      - name: property_id
        type: string
        description: GA4 property ID
        required: true
      - name: date_range
        type: object
        description: Date range for the report
        required: true
      - name: conversion_events
        type: array
        description: Specific conversion events to analyze
        required: false
    permissions:
      - scope: analytics:read
        required: true
    keywords:
      - analytics
      - ga4
      - conversions
      - goals
      - events
      - ecommerce
      - revenue
      - transactions
    estimated_tokens: 230
    examples:
      - "Show me my conversion rates"
      - "How many conversions did I get this month?"
      - "What's my e-commerce revenue?"

# ============================================================================
# Function Tools (Built-in, always available)
# ============================================================================
# Tools in this section are built-in SDK function tools — not delivered by an
# MCP server and not gated on an integration. ``default_global: true`` marks a
# tool as part of every account's global default tool inventory; the AH-PRD-06
# account tool-inventory endpoint emits these unconditionally.
#
# These metadata entries are independent of the Python implementations: the
# registry only describes tools, it does not instantiate them. Runtime wiring
# is owned by the agent factory (e.g. AH-PRD-04 ships ``create_visualization``).

function_tools:
  - name: create_visualization
    description: Render a chart artifact (e.g. Vega-Lite spec) and attach it to the response so the user can see the data alongside the agent's reply.
    category: visualization
    default_global: true
    keywords:
      - chart
      - graph
      - plot
      - visualization
      - vega
      - artifact
    estimated_tokens: 200
    examples:
      - "Chart this data as a bar chart"
      - "Show me a line graph of the trend"

  - name: set_todo_list
    description: Create or replace a named todo list in the session to track multi-step work across user turns. Sets the is_current flag and normalizes items.
    category: session
    default_global: true
    keywords:
      - todo
      - list
      - task
      - progress
      - checklist
      - plan
    estimated_tokens: 150
    examples:
      - "Create a todo list for the Q3 campaign build"
      - "Track the steps for this research phase"

  - name: update_todo_list
    description: Check or uncheck a single item in an existing todo list. Optionally rename the item. Stamps completed_at on check and clears it on uncheck.
    category: session
    default_global: true
    keywords:
      - todo
      - list
      - task
      - progress
      - checklist
      - plan
    estimated_tokens: 150
    examples:
      - "Mark the email-dates step as done"
      - "Uncheck the LinkedIn ads item"

# ============================================================================
# Agent Tools (Built-in, agent-as-a-tool)
# ============================================================================
# Tools in this section are ADK ``AgentTool`` wrappers around a leaf sub-agent
# (e.g. a Google-search agent holding the built-in ``google_search`` tool, which
# cannot be combined with other tools or an output_schema in the same agent).
# They surface in the agent tool picker under "Built-in" and attach to an agent
# only when its ``tool_ids`` lists them (opt-in: ``default_global: false``).
# Tool-id namespace: ``agent.{name}``. Runtime instances are owned by
# ``app/adk/tools/registry/agent_tool_registry.py`` (AH-98).

agent_tools:
  - name: google_search
    description: Search the public web via Google and return grounded results. Assignable to any agent; the agent may issue several google_search calls in a single turn and they run in parallel.
    category: research
    default_global: false
    keywords:
      - search
      - web
      - google
      - research
      - lookup
      - news
      - current
      - public
    estimated_tokens: 200
    examples:
      - "Search the web for recent news about this company"
      - "Look up the latest public data on this topic"

