# Tool Registry Configuration
# Sprint 2 Scope: Google Analytics tools only
# Additional tools will be added in future sprints

tools:
  # ============================================================================
  # Google Analytics Tools
  # ============================================================================

  # NOTE: tool names here MUST match the live google_analytics_mcp server's
  # @mcp.tool names exactly — they become an ADK McpToolset tool_filter that
  # matches on the live tool name. The server (KEN-E-AI/mcp-google-analytics,
  # simple_server.py) exposes the multi-tenant (``_mt``) variants; the platform
  # injects tenant_id + tenant_credentials, so agents never pass them.
  - name: get_account_summaries_mt
    description: List the Google Analytics accounts and GA4 properties the tenant has access to
    category: analytics
    mcp_server: google_analytics_mcp
    permissions:
      - scope: analytics:read
        required: true
    keywords:
      - analytics
      - ga4
      - accounts
      - properties
      - list
      - google
    estimated_tokens: 150
    examples:
      - "List my GA accounts"
      - "Show me my analytics properties"
      - "What GA4 properties do I have access to?"

  - name: get_property_details_mt
    description: Get configuration details for a specific GA4 property (display name, timezone, currency, create time)
    category: analytics
    mcp_server: google_analytics_mcp
    parameters:
      - name: property_id
        type: string
        description: GA4 property ID (e.g., "123456789")
        required: true
    permissions:
      - scope: analytics:read
        required: true
    keywords:
      - analytics
      - ga4
      - property
      - configuration
      - settings
      - details
    estimated_tokens: 180
    examples:
      - "Get details for property 123456789"
      - "Show me the configuration of my GA4 property"

  - name: run_report_mt
    description: Run a GA4 Data API report for traffic, engagement, conversions, audience, and top pages — customizable date ranges, metrics, dimensions, filters, and ordering. Pass two date ranges to compare periods; group by a dimension and order to rank (e.g. top pages, sources, demographics).
    category: analytics
    mcp_server: google_analytics_mcp
    parameters:
      - name: property_id
        type: string
        description: GA4 property ID
        required: true
      - name: date_ranges
        type: array
        description: One or more start/end date ranges (YYYY-MM-DD); pass two ranges to compare periods
        required: true
      - name: metrics
        type: array
        description: Metrics to retrieve (e.g., sessions, activeUsers, screenPageViews, conversions)
        required: true
      - name: dimensions
        type: array
        description: Dimensions to group/rank by (e.g., date, pagePath, sessionSource, country, age)
        required: false
    permissions:
      - scope: analytics:read
        required: true
    keywords:
      - analytics
      - ga4
      - traffic
      - users
      - sessions
      - pageviews
      - report
      - metrics
      - data
      - performance
      - compare
      - comparison
      - trend
      - growth
      - pages
      - top
      - audience
      - demographics
      - conversions
      - goals
      - revenue
    estimated_tokens: 250
    examples:
      - "Show me website traffic for the last 30 days"
      - "Compare sessions this month vs last month"
      - "What are my top 10 pages by pageviews?"
      - "How many conversions did I get this week?"

  - name: run_realtime_report_mt
    description: Run a GA4 realtime report for activity in the last 30 minutes (active users, current page views, traffic sources)
    category: analytics
    mcp_server: google_analytics_mcp
    parameters:
      - name: property_id
        type: string
        description: GA4 property ID
        required: true
      - name: metrics
        type: array
        description: Real-time metrics to retrieve (e.g., activeUsers, screenPageViews)
        required: false
        default: ["activeUsers"]
    permissions:
      - scope: analytics:read
        required: true
    keywords:
      - analytics
      - ga4
      - realtime
      - real-time
      - active
      - users
      - live
      - current
    estimated_tokens: 180
    examples:
      - "How many users are on my site right now?"
      - "Show me real-time traffic"
      - "What's the current activity on my website?"

# ============================================================================
# Function Tools (Built-in, always available)
# ============================================================================
# Tools in this section are built-in SDK function tools — not delivered by an
# MCP server and not gated on an integration. ``default_global: true`` marks a
# tool as part of every account's global default tool inventory; the AH-PRD-06
# account tool-inventory endpoint emits these unconditionally.
#
# These metadata entries are independent of the Python implementations: the
# registry only describes tools, it does not instantiate them. Runtime wiring
# is owned by the agent factory (e.g. AH-PRD-04 ships ``create_visualization``).

function_tools:
  - name: create_visualization
    description: Render a chart artifact (e.g. Vega-Lite spec) and attach it to the response so the user can see the data alongside the agent's reply.
    category: visualization
    default_global: true
    keywords:
      - chart
      - graph
      - plot
      - visualization
      - vega
      - artifact
    estimated_tokens: 200
    examples:
      - "Chart this data as a bar chart"
      - "Show me a line graph of the trend"

  - name: set_todo_list
    description: Create or replace a named todo list in the session to track multi-step work across user turns. Sets the is_current flag and normalizes items.
    category: session
    default_global: true
    keywords:
      - todo
      - list
      - task
      - progress
      - checklist
      - plan
    estimated_tokens: 150
    examples:
      - "Create a todo list for the Q3 campaign build"
      - "Track the steps for this research phase"

  - name: update_todo_list
    description: Check or uncheck a single item in an existing todo list. Optionally rename the item. Stamps completed_at on check and clears it on uncheck.
    category: session
    default_global: true
    keywords:
      - todo
      - list
      - task
      - progress
      - checklist
      - plan
    estimated_tokens: 150
    examples:
      - "Mark the email-dates step as done"
      - "Uncheck the LinkedIn ads item"

# ============================================================================
# Agent Tools (Built-in, agent-as-a-tool)
# ============================================================================
# Tools in this section are ADK ``AgentTool`` wrappers around a leaf sub-agent
# (e.g. a Google-search agent holding the built-in ``google_search`` tool, which
# cannot be combined with other tools or an output_schema in the same agent).
# They surface in the agent tool picker under "Built-in" and attach to an agent
# only when its ``tool_ids`` lists them (opt-in: ``default_global: false``).
# Tool-id namespace: ``agent.{name}``. Runtime instances are owned by
# ``app/adk/tools/registry/agent_tool_registry.py`` (AH-98).

agent_tools:
  - name: google_search
    description: Search the public web via Google and return grounded results. Assignable to any agent; the agent may issue several google_search calls in a single turn and they run in parallel.
    category: research
    default_global: false
    keywords:
      - search
      - web
      - google
      - research
      - lookup
      - news
      - current
      - public
    estimated_tokens: 200
    examples:
      - "Search the web for recent news about this company"
      - "Look up the latest public data on this topic"

  - name: numerical_analyst
    description: Compute numerical results (percentages, growth rates, averages, sorting) by writing and executing Python code in a sandboxed Gemini code executor. Use when a question requires arithmetic over retrieved figures.
    category: math
    default_global: false
    keywords:
      - arithmetic
      - calculate
      - percentage
      - average
      - growth
      - code
      - math
      - compute
      - formula
    estimated_tokens: 200
    examples:
      - "Calculate the percentage change between these two numbers"
      - "What is the average of these session counts?"
      - "Compute the week-over-week growth rate"

