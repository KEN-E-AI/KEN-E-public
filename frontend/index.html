<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/svg+xml" href="/kene-logo-square.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <title>KEN-E | Marketing Analyst</title>
    <!-- CSP note: if adding script-src, include the sha256 hash of this script or use a nonce -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("kene-theme");
          if (stored === "dark") document.documentElement.classList.add("dark");
        } catch (e) {
          console.warn("[theme] FOUC script error", e);
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
