# Config for the api/ sub-project. The api/ tree is collected only when
# pytest is launched from this directory (`cd api && pytest`); the repo-root
# config (../pyproject.toml) does NOT collect it.
[pytest]
# Set Python path to current directory so imports work correctly
pythonpath = .
# Load-bearing: scopes collection to api/tests/ ONLY. Do not remove. Without
# it a bare `pytest` recurses into api/scripts/ and api/test_*.py, which hold
# diagnostic SCRIPTS (not tests) — several call sys.exit() at import and abort
# collection with an INTERNALERROR. Real migration tests under
# api/scripts/tests/ stay out of scope by the same token (run them explicitly).
testpaths = tests
# Configure pytest-asyncio to properly handle async fixtures
asyncio_mode = auto
# Fail on any unregistered mark so marker typos / drift can't silently no-op.
addopts = --strict-markers
# Add markers for different test types. All custom marks must be registered
# because --strict-markers gates on every one of them. (`asyncio` is also
# registered by the pytest-asyncio plugin; listed here for clarity.)
markers =
    unit: Unit tests
    integration: Integration tests
    asyncio: Async tests
    slow: heavy/slow tests deselected from PR runs via -m 'not slow'
    llm: tests that exercise LLM tooling paths
    requires_firestore_emulator: tests that need a running Firestore emulator