<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Agents tab — Variant B (final)</title>
<link rel="stylesheet" href="colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html,body{margin:0;padding:0;height:100%;font-family:var(--font-body);color:var(--color-text-primary);background:var(--color-bg-secondary)}
  *{box-sizing:border-box}
  .stage{max-width:920px;margin:0 auto;padding:32px 16px}
  .frame{border-radius:16px;border:1px solid var(--color-border-default);background:var(--color-bg-elevated);box-shadow:var(--shadow-md);overflow:hidden}
  .chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-tertiary);font-weight:500}
  .chip svg{width:11px;height:11px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .btn-configure{padding:7px 16px;border-radius:9px;border:1.5px solid var(--color-border-default);background:var(--color-bg-elevated);font-family:inherit;font-weight:600;font-size:12px;color:var(--color-text-primary);cursor:pointer;transition:all .15s}
  .btn-configure:hover{border-color:var(--color-violet-500);color:var(--color-violet-500)}
  .status-pill{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:20px;background:var(--color-bg-secondary);font-size:10px;font-weight:700;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.04em;line-height:1.4}
  .status-pill::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--color-text-disabled)}
</style>
</head>
<body>
<div class="stage">
  <div class="frame" id="root" style="height:720px"></div>
</div>
<script type="text/babel" data-presets="react">
const Icon = ({ name, size = 14, color = 'currentColor', sw = 2 }) => {
  const paths = {
    'bar-chart': <><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></>,
    'megaphone': <><path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></>,
    'facebook': <><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></>,
    'file-text': <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></>,
    'cpu': <><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="2" x2="9" y2="4"/><line x1="15" y1="2" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="22"/><line x1="15" y1="20" x2="15" y2="22"/><line x1="20" y1="9" x2="22" y2="9"/><line x1="20" y1="14" x2="22" y2="14"/><line x1="2" y1="9" x2="4" y2="9"/><line x1="2" y1="14" x2="4" y2="14"/></>,
    'sparkles': <><path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3Z"/></>,
    'zap': <><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></>,
    'plus': <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
    'bot': <><rect x="3" y="8" width="18" height="12" rx="2"/><path d="M12 2v4"/><circle cx="8.5" cy="14" r="1"/><circle cx="15.5" cy="14" r="1"/></>,
    'filter': <><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></>,
  };
  return <svg viewBox="0 0 24 24" width={size} height={size} style={{stroke:color,strokeWidth:sw,fill:'none',strokeLinecap:'round',strokeLinejoin:'round',flexShrink:0}}>{paths[name]}</svg>;
};

const AGENTS = [
  { name: 'Google Analytics Specialist', model: 'Claude 4 Sonnet',  tools: 2, skills: 2, automations: 4, status: 'active',   icon: 'bar-chart', accent: 'var(--color-blue-500)' },
  { name: 'Google Ads Specialist',       model: 'Claude 4 Sonnet',  tools: 1, skills: 2, automations: 2, status: 'active',   icon: 'megaphone', accent: 'var(--color-amber-500)' },
  { name: 'Meta Ads Specialist',         model: 'GPT-4o',           tools: 3, automations: 6, extension: true, status: 'active',   icon: 'facebook',  accent: 'var(--color-violet-500)' },
  { name: 'Content Specialist',          model: 'Claude 3.5 Haiku', tools: 3, automations: 0, status: 'inactive', icon: 'file-text', accent: 'var(--color-teal-500)' },
];

function VariantB() {
  return (
    <div style={{background:'var(--color-bg-primary)',height:'100%',overflow:'auto'}}>
      <div style={{padding:'24px 24px 8px'}}>
        <h1 style={{margin:0,fontFamily:'var(--font-display)',fontSize:32,fontWeight:800,letterSpacing:'-0.02em'}}>Workflows</h1>
        <p style={{margin:'4px 0 18px',fontSize:13,color:'var(--color-text-tertiary)'}}>Build agents, teach them skills, and deploy automations</p>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
          <div style={{display:'inline-flex',gap:4,padding:4,background:'var(--color-bg-secondary)',borderRadius:10}}>
            {[['Agents','bot',true],['Skills','sparkles',false],['Automations','zap',false]].map(([l,i,a])=>(
              <div key={l} style={{display:'inline-flex',alignItems:'center',gap:6,padding:'7px 12px',borderRadius:8,background:a?'var(--color-bg-elevated)':'transparent',color:a?'var(--color-text-primary)':'var(--color-text-tertiary)',fontSize:12,fontWeight:600,boxShadow:a?'var(--shadow-sm)':'none'}}>
                <Icon name={i} size={13}/>{l}
              </div>
            ))}
          </div>
          <div style={{display:'inline-flex',alignItems:'center',gap:8,fontSize:11,fontWeight:600}}>
            <Icon name="filter" size={12} color="var(--color-text-tertiary)"/>
            <span style={{padding:'5px 10px',background:'var(--color-violet-500)',color:'#fff',borderRadius:6}}>All</span>
            <span style={{color:'var(--color-text-tertiary)'}}>Custom</span>
            <span style={{color:'var(--color-text-tertiary)'}}>From Extensions</span>
          </div>
        </div>
        <div style={{padding:'10px 14px',background:'var(--color-bg-elevated)',border:'1px solid var(--color-border-default)',borderRadius:10,fontSize:12,color:'var(--color-text-secondary)',lineHeight:1.5,marginBottom:14}}>
          Agents are AI assistants equipped with specific tools and skills. Configure an agent with a model, instructions, and capabilities.
        </div>
        <div style={{display:'flex',justifyContent:'flex-end',marginBottom:14}}>
          <button style={{display:'inline-flex',alignItems:'center',gap:6,padding:'8px 14px',borderRadius:10,border:'none',background:'var(--color-violet-500)',color:'#fff',fontFamily:'inherit',fontWeight:700,fontSize:12,cursor:'pointer',boxShadow:'var(--shadow-color-violet)'}}>
            <Icon name="plus" size={12} color="#fff"/>New Agent
          </button>
        </div>
      </div>
      <div style={{padding:'0 24px 24px',display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
        {AGENTS.map(a=>(
          <div key={a.name} style={{position:'relative',padding:'16px',borderRadius:14,border:'2px solid var(--color-border-default)',background:'var(--color-bg-elevated)',overflow:'hidden'}}>
            <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:12}}>
              <div style={{width:44,height:44,borderRadius:12,background:a.accent,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:`0 4px 12px ${a.accent}40`}}>
                <Icon name={a.icon} size={20} color="#fff"/>
              </div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6,flexWrap:'wrap',minHeight:22}}>
              <span style={{fontSize:13,fontWeight:700,lineHeight:1.25}}>{a.name}</span>
              {a.status==='inactive' && <span className="status-pill">Inactive</span>}
            </div>
            <div style={{fontSize:11,color:'var(--color-text-tertiary)',marginBottom:10,display:'flex',alignItems:'center',gap:4}}>
              <Icon name="cpu" size={11}/>{a.model}
            </div>
            <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:12}}>
              <span style={{fontSize:10,fontWeight:700,padding:'3px 8px',borderRadius:20,background:'var(--color-bg-secondary)',color:'var(--color-text-secondary)'}}>{a.tools} tool{a.tools!==1?'s':''}</span>
              {a.skills && <span style={{fontSize:10,fontWeight:700,padding:'3px 8px',borderRadius:20,background:'var(--color-violet-100)',color:'var(--color-violet-500)'}}>{a.skills} skills</span>}
              {a.automations>0 && <span style={{fontSize:10,fontWeight:700,padding:'3px 8px',borderRadius:20,background:'var(--color-teal-100)',color:'var(--color-teal-500)'}}>{a.automations} autos</span>}
              {a.extension && <span style={{fontSize:10,fontWeight:700,padding:'3px 8px',borderRadius:20,background:'var(--color-amber-100)',color:'var(--color-amber-500)'}}>Extension</span>}
            </div>
            <button className="btn-configure" style={{width:'100%'}}>Configure</button>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<VariantB/>);
</script>
</body>
</html>
