steps:
  # Install uv package manager and sync dependencies
  - name: "python:3.11-slim"
    id: install-dependencies
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        pip install uv --user && uv sync --frozen
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'

  # Run unit tests using pytest
  - name: "python:3.11-slim"
    id: unit-tests
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        uv run pytest tests/unit
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'

  # Run root integration tests (if any remain)
  - name: "python:3.11-slim"
    id: integration-tests
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        if [ -d "tests/integration" ] && [ "$(ls -A tests/integration)" ]; then
          uv run pytest tests/integration
        else
          echo "No integration tests in root project"
        fi
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'

  # Run API integration tests against a live Firestore emulator.
  #
  # 12 integration test files are gated behind FIRESTORE_EMULATOR_HOST via
  # pytest.mark.skipif (gate established in DM-85 / PR #509). Without a running
  # emulator they skip silently in CI, leaving AC-9 / AC-10 / FF-9 verified only
  # on developer machines. This step starts the emulator so the gate opens in
  # CI (DM-84).
  #
  # Image note: the cloud-sdk `:emulators` tag bundles gcloud + the JRE the
  # Firestore emulator requires; python:3.11-slim has neither. The emulator and
  # pytest MUST run in the same step — Cloud Build steps are separate
  # containers, so a background emulator started elsewhere would not survive.
  - name: "gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators"
    id: api-integration-tests
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        set -euo pipefail
        cd api

        # Start the Firestore emulator in the background on the port the test
        # suite expects (see tests/integration/*_no_orphans.py skip gate).
        gcloud emulators firestore start --host-port=127.0.0.1:8090 &

        # Block until the emulator accepts connections; fail fast after ~60s.
        for _ in $(seq 1 60); do
          curl -sf http://127.0.0.1:8090/ >/dev/null 2>&1 && break
          sleep 1
        done
        curl -sf http://127.0.0.1:8090/ >/dev/null 2>&1 \
          || { echo "Firestore emulator failed to start"; exit 1; }

        # Install uv via the standalone installer — the cloud-sdk image is an
        # externally-managed Python env where `pip install` is blocked (PEP 668).
        # The installer drops uv under HOME/.local/bin, and Cloud Build sets
        # HOME to /builder/home. The doubled dollar-signs escape Cloud Build
        # substitution so the shell receives literal HOME and PATH references.
        curl -LsSf https://astral.sh/uv/install.sh | sh
        export PATH="$$HOME/.local/bin:$$PATH"
        uv sync --frozen

        FIRESTORE_EMULATOR_HOST=127.0.0.1:8090 \
        GOOGLE_CLOUD_PROJECT_ID=test-project \
        GOOGLE_CLOUD_PROJECT=test-project \
          uv run pytest tests/integration

  # Run agent-side unit tests for the clean subdirectories of app/adk/.
  # Scope: agent_factory, mcp_config, and tracking test directories, plus the
  # colocated chat-callback suite in app/adk/agents/tests/ (CH-PRD-01 wave 3).
  # The chat-callback files are named explicitly rather than gating the whole
  # app/adk/agents/tests/ directory — the legacy suites there (test_ken_e_agent
  # etc.) are not yet CI-clean.
  # strategy_agent and other legacy subdirectories are excluded (pre-existing
  # failures / missing neo4j; tracked in follow-up issues AH-24+).
  # See AH-23 for the full gate rationale.
  - name: "python:3.11-slim"
    id: app-adk-tests
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        pip install uv --user
        uv sync --frozen
        uv run pytest \
          app/adk/agents/agent_factory/tests/ \
          app/adk/agents/tests/test_chat_callbacks.py \
          app/adk/agents/tests/test_callback_writes_counters.py \
          app/adk/mcp_config/tests/ \
          app/adk/tracking/tests/ \
          -q
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'

  # Lint gate: ruff + codespell + mypy scoped to clean agent-factory
  # subdirectories.  Legacy code under strategy_agent/ and agent_standalone_*
  # is excluded (follow-up AH-24+).  See AH-23 for scope rationale.
  #
  # mypy scope: tests/ are excluded — pytest fixtures use mocks
  # (MockCallbackContext, _FakeRegistry, dict[str, MagicMock]) that
  # legitimately don't satisfy strict typing; annotating them produces no
  # behavioural value.
  - name: "python:3.11-slim"
    id: lint
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        pip install uv --user
        uv sync --frozen
        uv run ruff check \
          app/adk/agents/agent_factory/ \
          app/adk/mcp_config/ \
          app/adk/tracking/ \
          app/adk/security/ \
          app/adk/tools/ \
          app/adk/deploy_packaging.py \
          app/adk/deploy_ken_e.py
        uv run codespell --toml pyproject.toml .
        uv run mypy \
          app/adk/agents/agent_factory/ \
          app/adk/mcp_config/ \
          app/adk/tracking/ \
          --exclude '/tests/' \
          --ignore-missing-imports
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'

  # Deploy-tree smoke test: assembles the Agent Engine artefacts into a temp
  # directory, imports build_hierarchy from the packaged tree (not the source
  # tree), and cloudpickle-round-trips every dispatch function to catch the
  # class of regression shipped in PR #382 (ModuleNotFoundError at Agent Engine
  # runtime) and the AH-17 regression (from __future__ import annotations +
  # cloudpickle breaking ADK FunctionTool declaration generation).
  # See AH-23 and deployment/ci/scripts/verify_deploy_tree.py for details.
  - name: "python:3.11-slim"
    id: deploy-tree-smoke
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        pip install uv --user
        uv sync --frozen
        uv run python deployment/ci/scripts/verify_deploy_tree.py
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'

  # Validate trace compliance — runs the validator unit tests AND checks that
  # canonical per-agent-type fixtures in app/adk/tracking/tests/fixtures/ all
  # pass validate_trace_compliance(). Non-compliant fixtures fail the build.
  # See docs/trace-structure-spec.md §11 and story 1.1.2-1.
  - name: "python:3.11-slim"
    id: trace-compliance-check
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        uv run pytest app/adk/tracking/tests/test_compliance.py -v
        PYTHONPATH=. uv run python -m app.adk.tracking.compliance_check \
          --fixtures app/adk/tracking/tests/fixtures/
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'

  # Run frontend accessibility test suite (axe-core, WCAG contrast, focus-ring audit,
  # keyboard navigation, and reduced-motion smoke tests).
  # Glob patterns let new a11y test files (src/test/*.test.{ts,tsx}) be picked up
  # automatically without editing this file.
  # See docs/design/components/ui/accessibility-baseline.md for the full gate description.
  - name: "node:20-slim"
    id: frontend-a11y-tests
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        set -euo pipefail
        cd frontend
        npm ci --prefer-offline
        npx vitest --run src/test/*.test.ts src/test/*.test.tsx

  # Validate markdown link integrity using lychee (offline mode — file:// links only).
  # Scope: docs/**/*.md and root-level *.md per lychee.toml. No network calls.
  # See docs/design/components/chat/projects/CH-PRD-06-documentation-link-integrity.md (CH-3)
  # and CLAUDE.md §6 G-4. Fails the build on any broken relative markdown link.
  #
  # Image pin — `:0.24.1-alpine`:
  #   - Pinned (not `:latest`) so a future upstream release can't silently break the gate.
  #   - Alpine/musl variant — avoids the glibc-version mismatch that broke the
  #     glibc-linked `:latest` image (see PR #271 build 9c746656). Bump deliberately.
  - name: "lycheeverse/lychee:0.24.1-alpine"
    id: markdown-link-check
    entrypoint: lychee
    args:
      - "--config"
      - "lychee.toml"
      - "."

logsBucket: gs://${PROJECT_ID}-logs-data/build-logs
options:
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
