# Step concurrency (DAG): Cloud Build runs steps sequentially by default, which
# left this build single-threaded on an 8-vCPU machine (~10 min wall-clock).
# The steps below run as a parallel DAG via `waitFor`:
#
#   * `install-dependencies` is the SOLE builder of the root `/workspace/.venv`.
#     Every root-venv consumer waits on it and then reads the venv read-only with
#     `uv run --no-sync` — `--no-sync` is REQUIRED so concurrent steps never race
#     to write the shared venv (plain `uv run` would re-sync on each invocation).
#   * The two api steps each spin up their own Firestore emulator on port 8090 and
#     sync `api/.venv`, so they cannot run concurrently with each other — they are
#     chained (api-unit waits on api-integration). The pair runs in parallel with
#     everything else.
#   * Frontend + markdown steps are independent (`waitFor: ['-']`). a11y waits on
#     BOTH frontend steps that run `npm ci` (typecheck + e2e) so its own `npm ci`
#     never overlaps either into the shared `frontend/node_modules` — e2e's
#     path-guard `exit 0` still satisfies the wait on non-frontend PRs, and the
#     typecheck dep closes the window where a fast e2e exit would otherwise let
#     a11y start while typecheck's `npm ci` is still in flight.
#     typecheck and e2e do still run `npm ci` concurrently with each other into
#     that directory (pre-existing). A single shared install step would remove
#     that overlap too, but e2e runs on the Playwright image while typecheck/a11y
#     run on node:20-slim, so one shared node_modules would span two images —
#     left unchanged here rather than altered without a way to validate that
#     cross-image.
steps:
  # Install uv package manager and sync dependencies. Sole builder of the root
  # /workspace/.venv (persisted across steps); all root-venv steps waitFor this.
  - name: "python:3.11-slim"
    id: install-dependencies
    waitFor: ['-']
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        set -euo pipefail
        pip install uv --user && uv sync --frozen
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'

  # Restore .mypy_cache from GCS so the lint step's mypy run is incremental
  # (~153s cold → ~10–20s warm). Runs in parallel with install-dependencies so
  # it adds zero wall-clock on a warm cache, and the lint step waits for both.
  # Best-effort only: the || true ensures a missing cache or GCS error never
  # gates the build. First-run (no cache yet) exits immediately with no effect.
  - name: "gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators"
    id: mypy-cache-restore
    waitFor: ['-']
    entrypoint: bash
    args:
      - "-c"
      - |
        gsutil -m rsync -r \
          gs://${PROJECT_ID}-logs-data/cache/.mypy_cache \
          /workspace/.mypy_cache || true

  # Run unit tests using pytest
  - name: "python:3.11-slim"
    id: unit-tests
    waitFor: ['install-dependencies']
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        set -euo pipefail
        uv run --no-sync pytest tests/unit
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'

  # Run root integration tests (if any remain)
  - name: "python:3.11-slim"
    id: integration-tests
    waitFor: ['install-dependencies']
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        set -euo pipefail
        if [ -d "tests/integration" ] && [ "$(ls -A tests/integration)" ]; then
          uv run --no-sync pytest tests/integration
        else
          echo "No integration tests in root project"
        fi
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'

  # Run API integration tests against a live Firestore emulator (DM-84).
  #
  # 12 integration test files are gated behind FIRESTORE_EMULATOR_HOST via
  # pytest.mark.skipif (gate established in DM-85 / PR #509). Without a running
  # emulator they skip silently in CI; this step starts one so the gate opens.
  #
  # The emulator + uv bootstrap is shared with the api-unit-tests step below
  # via deployment/ci/scripts/start_firestore_emulator.sh. Both steps run on
  # the cloud-sdk `:emulators` image (bundles gcloud + the JRE the emulator
  # needs; python:3.11-slim has neither). Each step starts its own emulator —
  # Cloud Build steps are separate containers, so one started elsewhere would
  # not survive.
  - name: "gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators"
    id: api-integration-tests
    waitFor: ['-']
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        set -euo pipefail
        source deployment/ci/scripts/start_firestore_emulator.sh
        cd api
        uv sync --frozen
        FIRESTORE_EMULATOR_HOST=127.0.0.1:8090 \
        GOOGLE_CLOUD_PROJECT_ID=test-project \
        GOOGLE_CLOUD_PROJECT=test-project \
          uv run pytest tests/integration

  # Run the API unit suite + the bulk top-level api/tests/test_*.py files (DM-90).
  #
  # Before DM-90 only api/tests/integration was gated in CI; api/tests/unit and
  # the bulk api/tests/test_*.py (~1900 tests) ran on no PR gate at all. This
  # step closes that gap.
  #
  # PHASED GATE: the full api/tests suite is not yet green, so this step runs
  # the known-green subset and --ignores the files still failing. `pytest tests`
  # is invoked as a DIRECTORY (not a test_*.py glob) so --ignore actually
  # filters during collection — passing glob-expanded file args makes --ignore
  # a silent no-op. New test files are therefore gated by default; only the
  # files listed below are excluded. Each is tracked by a DM-90 follow-up
  # issue — as a file is fixed, delete its --ignore line and the gate grows.
  #
  # tests/integration is excluded (gated by api-integration-tests above);
  # tests/middleware is out of DM-90 scope (api/tests/unit + bulk top-level).
  #
  # test_notification_service.py is ignored as flaky, not failing: across
  # repeated runs different tests in it fail nondeterministically (tight-loop
  # created_at ties + intra-class state bleed). A blocking gate cannot carry a
  # flaky file; its triage is a DM-90 follow-up.
  - name: "gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators"
    id: api-unit-tests
    waitFor: ['api-integration-tests']
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        set -euo pipefail
        source deployment/ci/scripts/start_firestore_emulator.sh
        cd api
        uv sync --frozen
        FIRESTORE_EMULATOR_HOST=127.0.0.1:8090 \
        GOOGLE_CLOUD_PROJECT_ID=test-project \
        GOOGLE_CLOUD_PROJECT=test-project \
          uv run pytest tests \
            --ignore=tests/integration \
            --ignore=tests/middleware

  # Run agent-side unit tests for the clean subdirectories of app/adk/.
  # Scope: agent_factory, mcp_config, security, and tracking test directories,
  # plus the colocated suites in app/adk/agents/utils/ and
  # app/adk/agents/models/ and the chat-callback suite in
  # app/adk/agents/tests/ (CH-PRD-01 wave 3).
  # The utils/ and models/ suites (~191 tests, including the review-pipeline
  # suite) were added in AH-54 — they are genuine pytest files that, living
  # outside a tests/ directory, previously ran on no PR.
  # The chat-callback files are named explicitly rather than gating the whole
  # app/adk/agents/tests/ directory — the legacy suites there (test_ken_e_agent
  # etc.) are not yet CI-clean.
  # The GA-specialist files (test_ga_oauth_reauth_callback,
  # test_google_analytics_specialist_e2e, test_user_built_ga_agent_e2e) are
  # named explicitly too (AH-PRD-03 Wave 2 / AH-27/28/29/95) — they carry the
  # only automated coverage of the OAuth-reauth and multi-tenant-isolation ACs;
  # their @pytest.mark.llm cases self-skip when Gemini/GA creds are absent.
  # security/tests/ added in AH-101 — covers tool-permission gating
  # (before-tool callback) that is security-relevant and was previously outside
  # both the pytest and mypy gates.
  # strategy_agent and other legacy subdirectories are excluded (pre-existing
  # failures / missing neo4j; tracked in follow-up issues AH-24+).
  # See AH-23 for the full gate rationale.
  # AH-110 / AH-PRD-13 §7 AC #3: app/adk/agents/agent_factory/tests/ includes
  # the Chat/Billing parity merge gate (test_chat_billing_parity.py) and the
  # ADK 2.0 probe ports (test_adk2_session_roundtrip.py, test_adk2_loop_agent_billing.py).
  # AH-113 / AH-PRD-13 §7 AC #9: app/adk/tracking/tests/ is the Weave-specific
  # tracking tier — includes test_no_adk2_event_field_consumers.py (static-analysis
  # guard: no production tracking module may read node_info / isolation_scope) plus
  # the emission-status span-set lock in test_transfer_to_specialist_fixture.py.
  # AH-119 / AH-PRD-15 §7 AC #3: app/adk/tools/agent_tools/tests/ is the
  # agent.{name} registry + ctx.run_node concurrency contract. AH-98 shipped
  # without CI coverage of this directory; AH-119 closes the gap and makes
  # the parallel-search AC #9 merge gate CI-enforced.
  - name: "python:3.11-slim"
    id: app-adk-tests
    waitFor: ['install-dependencies']
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        set -euo pipefail
        uv run --no-sync pytest \
          app/adk/agents/agent_factory/tests/ \
          app/adk/agents/utils/ \
          app/adk/agents/models/ \
          app/adk/agents/tests/test_chat_callbacks.py \
          app/adk/agents/tests/test_callback_writes_counters.py \
          app/adk/agents/tests/test_ga_oauth_reauth_callback.py \
          app/adk/agents/tests/test_google_analytics_specialist_e2e.py \
          app/adk/agents/tests/test_user_built_ga_agent_e2e.py \
          app/adk/mcp_config/tests/ \
          app/adk/security/tests/ \
          app/adk/tracking/tests/ \
          app/adk/tools/agent_tools/tests/ \
          -q
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'

  # Lint gate: ruff + codespell + mypy scoped to clean agent-factory
  # subdirectories.  Legacy code under strategy_agent/ and agent_standalone_*
  # is excluded (follow-up AH-24+).  See AH-23 for scope rationale.
  #
  # mypy scope: tests/ are excluded — pytest fixtures use mocks
  # (MockCallbackContext, _FakeRegistry, dict[str, MagicMock]) that
  # legitimately don't satisfy strict typing; annotating them produces no
  # behavioural value.
  #
  # Waits on mypy-cache-restore so the incremental cache is in place before
  # mypy runs. Both mypy-cache-restore and install-dependencies start at t=0;
  # whichever is slower sets the lint start time.
  - name: "python:3.11-slim"
    id: lint
    waitFor: ['install-dependencies', 'mypy-cache-restore']
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        set -euo pipefail
        uv run --no-sync ruff check \
          app/adk/agents/agent_factory/ \
          app/adk/mcp_config/ \
          app/adk/tracking/ \
          app/adk/security/ \
          app/adk/tools/ \
          app/adk/deploy_packaging.py \
          app/adk/deploy_ken_e.py
        uv run --no-sync codespell --toml pyproject.toml .
        uv run --no-sync mypy \
          app/adk/agents/agent_factory/ \
          app/adk/mcp_config/ \
          app/adk/tracking/ \
          --exclude '/tests/' \
          --ignore-missing-imports
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'

  # Write the updated .mypy_cache back to GCS so the next build starts warm.
  # Runs only after lint succeeds (if lint fails, the cache is not updated).
  # Best-effort: || true means a GCS write error never fails the build.
  # Ends at ~lint_end + rsync_time; lint ends ~200s after build start, well
  # within the ~331s critical path (e2e → a11y).
  - name: "gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators"
    id: mypy-cache-save
    waitFor: ['lint']
    entrypoint: bash
    args:
      - "-c"
      - |
        if [ -d /workspace/.mypy_cache ]; then
          gsutil -m rsync -r \
            /workspace/.mypy_cache \
            gs://${PROJECT_ID}-logs-data/cache/.mypy_cache || true
        fi

  # Shadow type-check using Astral's `ty` — non-gating evaluation step.
  # Evaluates ty against this Pydantic-heavy codebase without blocking the
  # build (|| true). Output is visible in build logs for comparison with mypy.
  # Run `uvx ty check --help` to see available flags as ty matures.
  - name: "python:3.11-slim"
    id: ty-shadow-check
    waitFor: ['install-dependencies']
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        uvx ty check \
          app/adk/agents/agent_factory/ \
          app/adk/mcp_config/ \
          app/adk/tracking/ || true
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'

  # no-AgentTool-in-chat-tree guard (AH-120 / AH-PRD-15 §7 AC #4):
  # Fails if any AgentTool( constructor exists in the chat-tree 2.0 build
  # (app/adk/), except inside strategy_agent/ (stays on ADK 1.34.1).
  # This guard locks in the AH-114/115/116 task-mode migration so no future
  # change silently reintroduces the #3984 event-drop regression.
  - name: "python:3.11-slim"
    id: no-agent-tool-guard
    waitFor: ['install-dependencies']
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        set -euo pipefail
        uv run --no-sync python api/scripts/lint/check_no_agent_tool_in_chat_tree.py
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'

  # Deploy-tree smoke test: assembles the Agent Engine artefacts into a temp
  # directory, imports build_hierarchy from the packaged tree (not the source
  # tree), and cloudpickle-round-trips every dispatch function to catch the
  # class of regression shipped in PR #382 (ModuleNotFoundError at Agent Engine
  # runtime) and the AH-17 regression (from __future__ import annotations +
  # cloudpickle breaking ADK FunctionTool declaration generation).
  # See AH-23 and deployment/ci/scripts/verify_deploy_tree.py for details.
  - name: "python:3.11-slim"
    id: deploy-tree-smoke
    waitFor: ['install-dependencies']
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        set -euo pipefail
        uv run --no-sync python deployment/ci/scripts/verify_deploy_tree.py
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'

  # Strategy deploy-tree smoke test: validates that the strategy-supervisor
  # deploy artefacts (deploy_with_sys_version.py, google-adk==1.34.1) can be
  # assembled and imported without triggering a live Vertex AI deploy, and that
  # the strategy tree has no accidental ADK 2.0-only imports at module scope.
  #
  # Two-deploy-tree decoupling (AH-105 / AH-106): the chat tree (deploy_ken_e.py)
  # runs on google-adk==2.0.0 while the strategy-supervisor tree stays pinned to
  # google-adk==1.34.1 until it is removed in a later release.  CI must smoke-
  # test each tree under its own pinned major to catch version-guard failures
  # before they reach staging.
  #
  # Step structure:
  #   1. Create a dedicated 1.34.1 venv (.venv-adk1) so this step is isolated
  #      from the root venv (2.0.0) built by install-dependencies.
  #   2. Install app/adk/requirements-strategy.txt into it (google-adk==1.34.1
  #      + all strategy-tree transitive deps).
  #   3. Run verify_strategy_deploy_tree.py from that venv so sys.executable is
  #      the 1.34.1 Python — required for Check 3 (subprocess import of
  #      deploy_with_sys_version.py which asserts the local ADK is 1.34.x).
  #
  # waitFor install-dependencies only for the uv binary; does not reuse the root
  # 2.0 venv.  See deployment/ci/scripts/verify_strategy_deploy_tree.py.
  - name: "python:3.11-slim"
    id: strategy-deploy-tree-smoke
    waitFor: ['install-dependencies']
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        set -euo pipefail
        pip install uv --user
        uv venv .venv-adk1
        uv pip install --python .venv-adk1/bin/python \
          -r app/adk/requirements-strategy.txt
        .venv-adk1/bin/python deployment/ci/scripts/verify_strategy_deploy_tree.py
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'

  # Validate trace compliance — runs the validator unit tests AND checks that
  # canonical per-agent-type fixtures in app/adk/tracking/tests/fixtures/ all
  # pass validate_trace_compliance(). Non-compliant fixtures fail the build.
  # See docs/trace-structure-spec.md §11 and story 1.1.2-1.
  - name: "python:3.11-slim"
    id: trace-compliance-check
    waitFor: ['install-dependencies']
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        set -euo pipefail
        uv run --no-sync pytest app/adk/tracking/tests/test_compliance.py -v
        PYTHONPATH=. uv run --no-sync python -m app.adk.tracking.compliance_check \
          --fixtures app/adk/tracking/tests/fixtures/
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'

  # Frontend TypeScript typecheck gate — enforces CLAUDE.md §6 G-3
  # (`npm run typecheck` passes for frontend TypeScript).
  #
  # Before this gate, pr_checks.yaml had no `tsc` invocation: the only
  # frontend gates were the a11y vitest suite and the (path-gated)
  # Playwright E2E suite, so TS errors in frontend/src landed on main
  # undetected.
  #
  # `npm run typecheck` runs `tsc -b` against the project references in
  # tsconfig.json; tsconfig.app.json includes `["src"]`, so this covers
  # the whole frontend/src tree.
  #
  # Note: tsconfig.app.json runs with `strict: false` and
  # `noImplicitAny: false` — this gate catches hard type errors but not
  # the softer ones those flags would surface. Tightening the config is
  # tracked as a separate follow-up.
  - name: "node:20-slim"
    id: frontend-typecheck
    waitFor: ['-']
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        set -euo pipefail
        cd frontend
        npm ci --prefer-offline
        npm run typecheck

  # Run Playwright E2E tests for the feature-flag admin-to-hook loop (FF-PRD-03 §5.4).
  # Starts Firestore + Auth emulators, seeds test users, runs the FastAPI backend at TTL=1s,
  # then exercises SC-1…SC-4 (domain_match, default, kill_switch, dev_override) via a headless
  # Chromium browser.
  #
  # Path-filter guard: the step exits 0 immediately when no changed file touches
  # frontend/** or the feature-flag service/router source, avoiding unnecessary ~3-min runs
  # for unrelated PRs.  Cloud Build doesn't support per-step fileFilter natively, so the
  # guard is implemented inline with `git diff --name-only`.
  #
  # Artifact upload: test-results/ (screenshots + traces) is copied to GCS on failure so
  # engineers can diagnose flaky tests without re-running locally.
  - name: "mcr.microsoft.com/playwright:v1.49.0-jammy"
    id: frontend-e2e-tests
    waitFor: ['-']
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        set -euo pipefail

        # Path-filter guard — skip step when no relevant files changed.
        # NOTE: shell vars are escaped as $$ to avoid Cloud Build substitution parsing.
        # Cloud Build's checkout has no remote-tracking refs, so fetch main
        # explicitly. If anything in the merge-base flow fails (detached HEAD,
        # network error, etc.) we fail open and run the full E2E suite — a
        # spurious 3-minute run is preferable to silently skipping the gate.
        git fetch --no-tags --depth=50 origin main 2>/dev/null || true
        BASE=$$(git merge-base HEAD FETCH_HEAD 2>/dev/null || true)
        if [ -z "$$BASE" ]; then
          echo "Could not determine merge-base with origin/main — running full E2E suite."
        else
          CHANGED=$$(git diff --name-only "$$BASE" HEAD)
          RELEVANT=$$(echo "$$CHANGED" | grep -E \
            '^frontend/|^api/src/kene_api/services/feature_flag_service\.py$|^api/src/kene_api/routers/(feature_flags|admin_feature_flags)\.py$' \
            || true)
          if [ -z "$$RELEVANT" ]; then
            echo "No feature-flag or frontend files changed — skipping E2E suite."
            exit 0
          fi
        fi

        # Start the emulator + backend stack in the background.
        bash deployment/ci/scripts/start_e2e_stack.sh &
        STACK_PID=$!

        # Wait for the backend to accept requests (start_e2e_stack.sh waits
        # internally, but add a belt-and-suspenders poll here in case the
        # script exits early). 503 is acceptable: Neo4j is not in the E2E
        # stack, so the app reports "degraded" while still serving FF endpoints.
        for i in $$(seq 1 30); do
          CODE=$$(curl -s -o /dev/null -w "%{http_code}" \
            http://127.0.0.1:8000/health 2>/dev/null || echo "000")
          case "$$CODE" in
            200|503) echo "Backend ready (HTTP $$CODE)."; break ;;
          esac
          sleep 2
        done

        # Install Playwright browsers (Chromium only — saves ~1 GB vs full install).
        cd frontend
        npm ci --prefer-offline
        npx playwright install --with-deps chromium

        # Run the E2E suite; capture exit code so we can upload artifacts before exiting.
        set +e
        npx playwright test
        E2E_EXIT=$?
        set -e

        # Upload test-results to GCS on failure for post-mortem inspection.
        # ${PROJECT_ID} and ${BUILD_ID} are Cloud Build built-in substitutions (intentional, not escaped).
        if [ $$E2E_EXIT -ne 0 ] && [ -d test-results ] && [ "$(ls -A test-results)" ]; then
          gsutil -m cp -r test-results \
            "gs://${PROJECT_ID}-logs-data/build-logs/${BUILD_ID}/playwright-test-results/" \
            || echo "WARNING: artifact upload failed (non-fatal)."
        fi

        # Kill the process group so all emulator children are cleaned up.
        STACK_PGID=$(ps -o pgid= $$STACK_PID 2>/dev/null | tr -d ' ' || true)
        [ -n "$$STACK_PGID" ] && kill -- "-$${STACK_PGID}" 2>/dev/null || true
        exit $$E2E_EXIT
    env:
      - 'PATH=/usr/local/bin:/usr/bin:/usr/local/sbin:/usr/sbin'

  # Run frontend accessibility test suite (axe-core, WCAG contrast, focus-ring audit,
  # keyboard navigation, and reduced-motion smoke tests).
  # Glob patterns let new a11y test files (src/test/*.test.{ts,tsx}) be picked up
  # automatically without editing this file.
  # Declared after the other frontend steps so its `waitFor` can reference them —
  # Cloud Build only permits waitFor on steps defined earlier in the list. a11y
  # waits on both frontend `npm ci` writers (typecheck + e2e) so its own `npm ci`
  # never overlaps either into the shared node_modules.
  # See docs/design/components/ui/accessibility-baseline.md for the full gate description.
  - name: "node:20-slim"
    id: frontend-a11y-tests
    waitFor: ['frontend-e2e-tests', 'frontend-typecheck']
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        set -euo pipefail
        cd frontend
        npm ci --prefer-offline
        npx vitest --run src/test/*.test.ts src/test/*.test.tsx

  # Validate markdown link integrity using lychee (offline mode — file:// links only).
  # Scope: docs/**/*.md and root-level *.md per lychee.toml. No network calls.
  # See docs/design/components/chat/projects/CH-PRD-06-documentation-link-integrity.md (CH-3)
  # and CLAUDE.md §6 G-4. Fails the build on any broken relative markdown link.
  #
  # Image pin — `:0.24.1-alpine`:
  #   - Pinned (not `:latest`) so a future upstream release can't silently break the gate.
  #   - Alpine/musl variant — avoids the glibc-version mismatch that broke the
  #     glibc-linked `:latest` image (see PR #271 build 9c746656). Bump deliberately.
  - name: "lycheeverse/lychee:0.24.1-alpine"
    id: markdown-link-check
    waitFor: ['-']
    entrypoint: lychee
    args:
      - "--config"
      - "lychee.toml"
      - "."

