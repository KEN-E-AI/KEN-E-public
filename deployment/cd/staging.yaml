# ---------------------------------------------------------------------------
# AH-156: Staging-deploy serialization contract
#
# Problem: a burst of pushes to main fires concurrent staging builds, each
# calling agent_engines.update() against the single shared staging chat
# engine.  Concurrent LROs on one engine amplify Vertex transient 500s and
# produce false-red CD signals for green commits.
#
# Solution (Options 1 + 2 from AH-156):
#
#   1. supersede-redundant-builds  — at build start, cancels only
#      STRICTLY-OLDER WORKING/QUEUED cd-pipeline builds (ordered by
#      createTime), reducing the in-flight blast radius without ever
#      cancelling a newer/tip build.  Best-effort: cancellation failures are
#      warned, not fatal.  Cancellation kills Cloud Build containers but does
#      NOT abort an in-flight Vertex LRO — the tip-commit guard below is the
#      authoritative safety net.
#
#   2. tip-commit-guard  — reads origin/main's tip via `git ls-remote`
#      (read-only — no /workspace/.git mutation, so it cannot race the
#      concurrent decide-chat-loadtest fetch) and writes
#      /workspace/proceed_with_deploy.flag = "true"|"false".  A stale
#      build's flag is "false"; its five gated deploy steps below exit 0
#      immediately with a [AH-156] log line.  Fails OPEN on ls-remote failure
#      so an infra glitch never silently skips a real deploy.
#
# Gated steps (read /workspace/proceed_with_deploy.flag):
#   • deploy-strategy-supervisor-staging  (agent_engines.update — strategy)
#   • deploy-ken-e-agent-staging          (agent_engines.update — chat)
#   • deploy-api-to-cloud-run             (Cloud Run API service)
#   • deploy-react-cloud-run              (Cloud Run frontend service)
#   • trigger-prod-deployment             (prod-trigger fan-out)
#
# Ungated steps (container builds/pushes, load tests, export):
#   Content-addressed images are safe to build on stale commits.
#   Load tests exercise the already-deployed API, not this build's image.
#
# Operator override / residual-race notes: see
#   deployment/runbooks/staging-cd-supersession.md
# ---------------------------------------------------------------------------

steps:
  # -------------------------------------------------------------------------
  # AH-156 Step 1: Cancel strictly-older in-flight staging builds (never the tip).
  # Runs at build start (waitFor: ['-']) in parallel with tip-commit-guard.
  # -------------------------------------------------------------------------
  - name: gcr.io/cloud-builders/gcloud
    id: supersede-redundant-builds
    waitFor: ['-']
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        set -uo pipefail
        echo "[AH-156] Listing WORKING/QUEUED 'cd-pipeline' builds (id + epoch createTime) to supersede only strictly-older builds..."
        # Two passes (WORKING, QUEUED) to avoid dependency on OR-filter support
        # across all gcloud versions in this image.  createTime is requested as
        # epoch seconds via date('%s') so the ordering comparison is purely
        # numeric (no locale / RFC3339 fractional-second pitfalls) and depends
        # only on cloudbuild.builds.list — NOT builds.get/describe, which the
        # cicd-runner SA may not hold.
        TMPFILE=$$(mktemp)
        for STATUS in WORKING QUEUED; do
          gcloud builds list \
            --project="${PROJECT_ID}" \
            --filter="status=$$STATUS AND substitutions.TRIGGER_NAME='cd-pipeline'" \
            --format="value(id,createTime.date('%s'))" \
            --page-size=50 2>/dev/null >> "$$TMPFILE" \
            || echo "[AH-156][WARN] builds list for status $$STATUS failed — continuing."
        done
        # Resolve THIS build's epoch createTime from the same list (it is WORKING
        # now, so it appears in the WORKING pass).  read -r ID EPOCH splits the
        # tab-separated value() output; id/epoch carry no embedded whitespace.
        SELF_EPOCH=""
        while read -r ID EPOCH; do
          if [ "$$ID" = "${BUILD_ID}" ]; then SELF_EPOCH="$$EPOCH"; break; fi
        done < "$$TMPFILE"
        # Fail SAFE: if we cannot establish our own ordering, cancel nobody.  The
        # tip-commit-guard is the authoritative safety net — skipping supersession
        # only forgoes best-effort blast-radius reduction; it never risks
        # cancelling the tip build.
        if ! printf '%s' "$$SELF_EPOCH" | grep -qE '^[0-9]+$$'; then
          echo "[AH-156][WARN] Could not resolve this build's createTime from the list — skipping supersession."
          rm -f "$$TMPFILE"
          exit 0
        fi
        echo "[AH-156] This build ${BUILD_ID} createTime(epoch)=$$SELF_EPOCH — cancelling only strictly-older builds."
        CANCELLED=0
        KEPT=0
        FAILED=0
        while read -r ID EPOCH; do
          [ -z "$$ID" ] && continue
          [ "$$ID" = "${BUILD_ID}" ] && continue
          # Cancel only builds strictly OLDER than this one (smaller epoch).  A
          # newer/same/unparsable epoch is KEPT so a stale build can never cancel
          # the tip — the review gap this change closes.
          if printf '%s' "$$EPOCH" | grep -qE '^[0-9]+$$' && [ "$$EPOCH" -lt "$$SELF_EPOCH" ]; then
            echo "[AH-156] Cancelling superseded older build: $$ID (epoch=$$EPOCH)"
            CANCEL_OUT=$$(gcloud builds cancel "$$ID" --project="${PROJECT_ID}" 2>&1) \
              && CANCEL_RC=0 || CANCEL_RC=$$?
            if [ "$$CANCEL_RC" -eq 0 ]; then
              CANCELLED=$$((CANCELLED + 1))
            else
              SAFE_OUT=$$(printf '%s' "$$CANCEL_OUT" | tr -d '\000-\010\013\014\016-\037' | head -c 500)
              echo "[AH-156][WARN] Cancel returned non-zero for $$ID (may be terminal): $$SAFE_OUT"
              FAILED=$$((FAILED + 1))
            fi
            sleep 0.2   # stay under the ~10 req/s Cloud Build cancel quota (matches AH-154 script)
          else
            echo "[AH-156] Keeping $$ID (epoch=$$EPOCH not strictly older than $$SELF_EPOCH)."
            KEPT=$$((KEPT + 1))
          fi
        done < "$$TMPFILE"
        rm -f "$$TMPFILE"
        echo "[AH-156] Supersession complete: $$CANCELLED cancelled, $$KEPT kept, $$FAILED failed."

  # -------------------------------------------------------------------------
  # AH-156 Step 2: Write proceed_with_deploy.flag = true|false.
  # Runs at build start (waitFor: ['-']) in parallel with supersede step.
  # Fails OPEN on git ls-remote failure so an infra glitch never silently drops
  # a real deploy.
  # -------------------------------------------------------------------------
  - name: gcr.io/cloud-builders/gcloud
    id: tip-commit-guard
    waitFor: ['-']
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        set -uo pipefail
        # Use ls-remote (read-only) rather than `git fetch origin main`, so this
        # step never writes to the shared /workspace/.git — which would otherwise
        # race the concurrent decide-chat-loadtest fetch (both run at
        # waitFor: ['-'] against the same checkout). ls-remote returns the remote
        # tip without touching FETCH_HEAD or .git/shallow.
        TIP=$$(git ls-remote origin refs/heads/main 2>/dev/null | cut -f1) \
          || { echo "[AH-156] WARN: git ls-remote failed — failing open (will proceed with deploy)."; echo "true" > /workspace/proceed_with_deploy.flag; exit 0; }
        # Validate that the SHA is a 40-character hex string before using it.
        if ! printf '%s' "$$TIP" | grep -qE '^[0-9a-f]{40}$$'; then
          echo "[AH-156] WARN: git ls-remote returned non-SHA value — failing open."
          echo "true" > /workspace/proceed_with_deploy.flag
          exit 0
        fi
        if [ "${COMMIT_SHA}" = "$$TIP" ]; then
          echo "[AH-156] tip-commit-guard: ${COMMIT_SHA} IS the tip of origin/main — proceeding with deploy."
          echo "true" > /workspace/proceed_with_deploy.flag
        else
          echo "[AH-156] tip-commit-guard: ${COMMIT_SHA} is superseded (tip is $$TIP) — deploy steps will skip."
          echo "false" > /workspace/proceed_with_deploy.flag
        fi

  - name: "python:3.11-slim"
    id: install-dependencies
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        pip install uv --user && uv sync --frozen
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'

  # CrewAI deployment removed - using ADK Agent Engine ID directly in API

  # Deploy Strategy Supervisor Agent to Staging
  # This must happen BEFORE API deployment so API gets the fresh engine ID.
  #
  # Two-deploy-tree decoupling (AH-105 / AH-106): the strategy tree is pinned
  # to google-adk==1.34.1 while the chat tree runs on google-adk==2.0.0.  Both
  # trees share the same app/ source but deploy from different ADK venvs so the
  # agent is cloudpickled against the correct major.  The strategy step MUST use
  # its own dedicated .venv-adk1 built from requirements-strategy.txt — do NOT
  # reuse the chat step's 2.0 venv (app/adk/.venv) or `uv run` which would
  # resolve against app/adk/pyproject.toml (2.0.0).
  #
  # References: AH-105 (chat pin bump), AH-106 (CD decoupling), requirements-
  # strategy.txt header.
  - name: "python:3.12-slim"
    id: deploy-strategy-supervisor-staging
    waitFor: ['install-dependencies', 'tip-commit-guard']
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        if [ "$(cat /workspace/proceed_with_deploy.flag 2>/dev/null)" != "true" ]; then
          echo "[AH-156] tip-commit-guard: superseded — skipping deploy-strategy-supervisor-staging"
          exit 0
        fi
        cd app/adk
        pip install uv --user
        uv venv .venv-adk1
        uv pip install --python .venv-adk1/bin/python \
          -r requirements-strategy.txt
        .venv-adk1/bin/python deploy_with_sys_version.py --env staging
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'
      - 'GOOGLE_CLOUD_PROJECT=${_STAGING_PROJECT_ID}'
      - 'WANDB_API_KEY=${_WANDB_API_KEY_STAGING}'
      - 'WANDB_ENTITY=ken-e'
      - 'WANDB_PROJECT=ken-e-strategy-agent-staging'
      - 'WEAVE_PROJECT_NAME=ken-e-strategy-agent-staging'

  # Deploy KEN-E Chat Agent to Staging
  # This must happen BEFORE API deployment so API gets the fresh engine ID.
  #
  # Two-deploy-tree decoupling (AH-105 / AH-106): the chat tree uses
  # google-adk[mcp]==2.0.0.  `cd app/adk && uv sync --frozen` creates the 2.0
  # venv from the regenerated app/adk/uv.lock (AH-106); `uv run` then invokes
  # deploy_ken_e.py from that 2.0 venv.  The strategy step above runs from its
  # own .venv-adk1 (1.34.1) and does not interfere with this step.
  - name: "python:3.12-slim"
    id: deploy-ken-e-agent-staging
    waitFor: ['deploy-strategy-supervisor-staging', 'tip-commit-guard']
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        if [ "$(cat /workspace/proceed_with_deploy.flag 2>/dev/null)" != "true" ]; then
          echo "[AH-156] tip-commit-guard: superseded — skipping deploy-ken-e-agent-staging"
          exit 0
        fi
        cd app/adk
        uv sync --frozen
        uv run python deploy_ken_e.py --env staging
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'
      - 'GOOGLE_CLOUD_PROJECT=${_STAGING_PROJECT_ID}'
      - 'WANDB_API_KEY=${_WANDB_API_KEY_STAGING}'
      - 'WANDB_ENTITY=ken-e'
      - 'WANDB_PROJECT=ken-e-strategy-agent-staging'
      - 'WEAVE_PROJECT_NAME=ken-e-strategy-agent-staging'
      # AH-42: build_hierarchy() resolves ${GA_MCP_SERVER_URL} from the
      # google_analytics_mcp server doc at deploy time. Pre-AH-42 the doc
      # was missing so the lookup was skipped; once seeded, mcp.py:209
      # requires the env var. Same value as app/adk/.env.staging.
      - 'GA_MCP_SERVER_URL=https://google-analytics-mcp-4quwenkusq-uc.a.run.app'

  - name: gcr.io/cloud-builders/gcloud
    id: fetch-auth-token
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        echo $(gcloud auth print-access-token -q) > auth_token.txt

  # Load Testing
  - name: "python:3.11-slim"
    id: load_test
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        export _AUTH_TOKEN=$(cat auth_token.txt)
        uv add locust==2.32.6 gevent==24.11.1
        uv run locust -f tests/load_test/load_test.py \
        --headless \
        -t 15s -u 1 -r 0.25 \
        --csv=tests/load_test/.results/results \
        --html=tests/load_test/.results/report.html
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'

  # ---------------------------------------------------------------------------
  # Decide whether to run the (expensive) chat-sidebar load test this build.
  #
  # The chat-sidebar gate polls GET /api/v1/chat/conversations against the live
  # staging API, each poll running a Firestore query on the (default) database.
  # Running it on EVERY merge to main was the dominant driver of staging
  # Firestore read-ops billing.  Gate it to commits that actually touch the
  # /conversations request path — the router, the chat service, AND the
  # firestore/redis_client/dependencies modules it reads through (the
  # user_context cache + Firestore query the gate exists to protect) — plus
  # the seed + load-test harness and this pipeline.  Every other merge (ADK,
  # docs, other components) skips the seed + load-test + p95 steps.
  #
  # Writes "true"/"false" to /workspace/run_chat_loadtest.flag; the three gated
  # steps below early-exit 0 when it is not "true".  Fails OPEN (runs) if the
  # parent commit can't be resolved, so a shallow-clone edge case never silently
  # drops the gate — worst case is the pre-existing every-merge behaviour.
  # ---------------------------------------------------------------------------
  - name: gcr.io/cloud-builders/gcloud
    id: decide-chat-loadtest
    waitFor: ['-']
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        set -uo pipefail
        PATTERN='^(api/src/kene_api/routers/chat\.py|api/src/kene_api/chat/|api/src/kene_api/models/chat\.py|api/src/kene_api/(firestore|redis_client|dependencies)\.py|api/scripts/seed_chat_load_test_data\.py|tests/load_test/|deployment/cd/staging\.yaml)'
        RUN=true
        # Push triggers check out a shallow clone; fetch the parent so we can diff.
        git fetch --deepen=1 origin "${COMMIT_SHA}" >/dev/null 2>&1 \
          || git fetch --unshallow >/dev/null 2>&1 || true
        if git rev-parse -q --verify "${COMMIT_SHA}^" >/dev/null 2>&1; then
          CHANGED="$(git diff --name-only "${COMMIT_SHA}^" "${COMMIT_SHA}")"
          echo "Changed files vs parent:"; echo "$$CHANGED"
          if echo "$$CHANGED" | grep -Eq "$$PATTERN"; then RUN=true; else RUN=false; fi
        else
          echo "WARN: parent of ${COMMIT_SHA} unavailable — failing open (will run)."
        fi
        echo "$$RUN" > /workspace/run_chat_loadtest.flag
        echo "chat-sidebar load test will run: $$RUN"

  # ---------------------------------------------------------------------------
  # API build + deploy chain — must be declared BEFORE chat-sidebar-load-test
  # because Cloud Build requires waitFor references to point at earlier steps.
  #
  # Runs in parallel with the load-test setup via waitFor: ['-'] on the head
  # of the chain.  chat-sidebar-load-test (below) waitFors
  # deploy-api-to-cloud-run so it exercises the API image built from THIS
  # commit (and the LOAD_TEST_BYPASS_UID env var that comes with it), not
  # the previous build's image.
  # ---------------------------------------------------------------------------

  # Copy shared package into api directory so Dockerfile can access it
  - name: "gcr.io/cloud-builders/gcloud"
    id: copy-shared-to-api
    waitFor: ['-']
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        cp -r shared api/shared
        echo "Copied shared/ package into api/ directory"

  - name: "gcr.io/cloud-builders/docker"
    id: build-api-image
    waitFor: ['copy-shared-to-api']
    dir: api
    args:
      - build
      - "-t"
      - "gcr.io/${PROJECT_ID}/kene-api-staging:${COMMIT_SHA}"
      - "-f"
      - "Dockerfile"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    id: push-api-image
    waitFor: ['build-api-image']
    args:
      - push
      - "gcr.io/${PROJECT_ID}/kene-api-staging:${COMMIT_SHA}"

  - name: "gcr.io/cloud-builders/gcloud"
    id: deploy-api-to-cloud-run
    waitFor: ['push-api-image', 'tip-commit-guard']
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
          if [ "$(cat /workspace/proceed_with_deploy.flag 2>/dev/null)" != "true" ]; then
            echo "[AH-156] tip-commit-guard: superseded — skipping deploy-api-to-cloud-run"
            exit 0
          fi
          set -e
          set -x

          echo "Deploying Cloud Run service with attached service account and VPC connector..."
          gcloud run deploy kene-api-staging \
            --image=gcr.io/${PROJECT_ID}/kene-api-staging:${COMMIT_SHA} \
            --region=${_REGION} \
            --platform=managed \
            --project=${_STAGING_PROJECT_ID} \
            --allow-unauthenticated \
            --memory=1Gi \
            --port=8000 \
            --timeout=300 \
            --cpu-boost \
            --service-account=${_API_SERVICE_ACCOUNT_EMAIL} \
            --vpc-connector=ken-e-staging-connector \
            --clear-secrets \
            --set-env-vars "^;^DEBUG=false;HOST=0.0.0.0;ENVIRONMENT=staging;NEO4J_URI=${_NEO4J_URI};NEO4J_USERNAME=${_NEO4J_USERNAME};NEO4J_PASSWORD=${_NEO4J_PASSWORD};NEO4J_DATABASE=${_NEO4J_DATABASE};AURA_INSTANCEID=${_AURA_INSTANCEID};AURA_INSTANCENAME=${_AURA_INSTANCENAME};SUPERSET_BASE_URL=${_SUPERSET_BASE_URL};SUPERSET_USERNAME=${_SUPERSET_USERNAME};SUPERSET_PASSWORD=${_SUPERSET_PASSWORD};GOOGLE_CLOUD_PROJECT_ID=${_STAGING_PROJECT_ID};FIRESTORE_DATABASE_ID=(default);LOG_LEVEL=INFO;USE_APPLICATION_DEFAULT_CREDENTIALS=true;RECAPTCHA_SITE_KEY=${_RECAPTCHA_SITE_KEY_STAGING};RECAPTCHA_SECRET_KEY=${_RECAPTCHA_SECRET_KEY_STAGING};VERTEX_AI_LOCATION=${_VERTEX_AI_LOCATION};VERTEX_AI_AGENT_ENGINE_ID=${_VERTEX_AI_AGENT_ENGINE_ID_STAGING};REDIS_HOST=${_REDIS_HOST_STAGING};REDIS_PORT=${_REDIS_PORT};REDIS_DB=${_REDIS_DB};SUPPRESS_REDIS_WARNING=false;SENDGRID_API_KEY=${_SENDGRID_API_KEY_STAGING};APP_BASE_URL=https://staging.app.ken-e.ai;EMAIL_FROM_ADDRESS=noreply@ken-e.ai;EMAIL_FROM_NAME=KEN-E Team;KEN_E_ENGINE_ID=${_KEN_E_ENGINE_ID_STAGING};STRATEGY_SUPERVISOR_ENGINE_ID=${_STRATEGY_SUPERVISOR_ENGINE_ID_STAGING};ENCRYPTION_KEY=${_ENCRYPTION_KEY_STAGING};GOOGLE_OAUTH_CLIENT_ID=${_GOOGLE_OAUTH_CLIENT_ID_STAGING};GOOGLE_OAUTH_CLIENT_SECRET=${_GOOGLE_OAUTH_CLIENT_SECRET_STAGING};GOOGLE_OAUTH_REDIRECT_URI=https://kene-api-staging-391472102753.us-central1.run.app/api/oauth/callback/google;FRONTEND_URL=https://staging.app.ken-e.ai;CORS_ORIGINS=https://staging.app.ken-e.ai;OPENAI_API_KEY=${_OPENAI_API_KEY_STAGING};WANDB_API_KEY=${_WANDB_API_KEY_STAGING};WANDB_PROJECT=ken-e-strategy-agent-staging;WANDB_ENTITY=ken-e;WEAVE_PROJECT_NAME=ken-e-strategy-agent-staging;VERTEX_AI_PROJECT_ID=${_STAGING_PROJECT_ID};LOAD_TEST_BYPASS_UID=${_CHAT_LOADTEST_UID};CHAT_INTERNAL_SA_ALLOWLIST=${_CHAT_INTERNAL_SA_ALLOWLIST_STAGING};CHAT_INTERNAL_OIDC_AUDIENCE=https://kene-api-staging-391472102753.us-central1.run.app"

  # Validate load-test substitution variables before running the gate
  - name: "bash"
    id: validate-loadtest-vars
    args:
      - "-c"
      - |
        set -euo pipefail
        [[ -n "${_CHAT_LOADTEST_UID}" ]] || { echo "ERROR: _CHAT_LOADTEST_UID is empty — set it in the Cloud Build trigger substitutions"; exit 1; }
        echo "validate-loadtest-vars: _CHAT_LOADTEST_UID is set"

  # Seed Firestore with chat sessions for the sidebar load test
  - name: "python:3.11-slim"
    id: seed-chat-loadtest
    waitFor: ['validate-loadtest-vars', 'decide-chat-loadtest']
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        set -euo pipefail
        if [ "$(cat /workspace/run_chat_loadtest.flag 2>/dev/null)" != "true" ]; then
          echo "seed-chat-loadtest: commit does not touch chat/load-test paths — skipping seed."
          exit 0
        fi
        uv run python api/scripts/seed_chat_load_test_data.py
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'
      - 'GOOGLE_CLOUD_PROJECT_ID=${_STAGING_PROJECT_ID}'
      - 'ENVIRONMENT=staging'
      - 'FIREBASE_PROJECT_ID=${_STAGING_PROJECT_ID}'

  # Chat Sidebar Load Test
  # waitFors deploy-api-to-cloud-run so the load test exercises the API image
  # built from this commit (and the LOAD_TEST_BYPASS_UID env var that comes
  # with it).  Without this, the load test would hit the previous build's
  # image and re-trigger the per-IP rate limiter loop indefinitely.
  - name: "python:3.11-slim"
    id: chat-sidebar-load-test
    waitFor: ['seed-chat-loadtest', 'deploy-api-to-cloud-run']
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        set -euo pipefail
        if [ "$(cat /workspace/run_chat_loadtest.flag 2>/dev/null)" != "true" ]; then
          echo "chat-sidebar-load-test: commit does not touch chat/load-test paths — skipping."
          exit 0
        fi
        # `uv pip install --system` installs into the container's system Python
        # without mutating pyproject.toml / uv.lock in the shared workspace —
        # `uv add` would, and later steps share that workspace volume.
        uv pip install --system \
          locust==2.32.6 gevent==24.11.1 requests==2.32.3 firebase-admin==6.5.0
        # --exit-code-on-error 0 on locust: don't fail this step on individual
        # request failures.  The dedicated chat-sidebar-p95-check step is the
        # gate; it reads the stats CSV and applies a tolerated failure_ratio
        # + p95 threshold.
        #
        # Sizing: -u 100 / -t 2m / -r 10 (reduced from -u 1000 / -t 6m / -r 33).
        # Each poll runs a live Firestore query against staging's (default) DB,
        # so 1000 VUs for 6 min drove ~1M document reads per deploy.  1000 VUs on
        # the 1-vCPU staging service mostly exercised Cloud Run autoscale tail
        # (see the p90-gate note below) rather than query behaviour; 100 VUs keeps
        # a real concurrency signal for the p90 gate at a fraction of the reads.
        #
        # The FIREBASE_* / CHAT_LOADTEST_UID / API_BASE_URL assignments below
        # MUST stay on the lines immediately preceding `locust` with no
        # comments in between — they're shell inline env-vars passed to that
        # one process, and an interleaved `# ...` line breaks the backslash
        # continuation and silently strips them (build 3ae6a795 — 0 reqs).
        FIREBASE_WEB_API_KEY=${_VITE_FIREBASE_API_KEY} \
        FIREBASE_PROJECT_ID=${_STAGING_PROJECT_ID} \
        FIREBASE_ADMIN_SA_EMAIL=${_FIREBASE_ADMIN_SA_EMAIL_STAGING} \
        CHAT_LOADTEST_UID=${_CHAT_LOADTEST_UID} \
        API_BASE_URL=${_STAGING_API_URL} \
        locust -f tests/load_test/chat_sidebar_polling.py \
          --headless \
          --exit-code-on-error 0 \
          -t 2m -u 100 -r 10 \
          --csv=tests/load_test/.results/chat_sidebar \
          --html=tests/load_test/.results/chat_sidebar_report.html
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'

  # Chat Sidebar p95 Latency Gate
  - name: "python:3.11-slim"
    id: chat-sidebar-p95-check
    waitFor: ['chat-sidebar-load-test']
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        set -euo pipefail
        if [ "$(cat /workspace/run_chat_loadtest.flag 2>/dev/null)" != "true" ]; then
          echo "chat-sidebar-p95-check: load test skipped — nothing to gate."
          exit 0
        fi
        # Staging gate — intentionally looser than the CH-PRD-02 100 ms product
        # target.  Staging runs on a small (1 vCPU / 1 GiB) Cloud Run service
        # with min_instances=1, maxScale=20, containerConcurrency=80; 1000
        # polling VUs still surface scale-up + Firestore-cold-cache tail
        # latency that dominates p95 non-deterministically across runs (build
        # b7f69874 p95=13s, build c2d97134 p95=77s, same code).  Gate on p90
        # instead, which sits below the scale-up tail and is consistent
        # across runs (5.4s yesterday, 7.6s the day before, well under 15s).
        # The 1 % failure ratio still tolerates Cloud Run scale-up 502s.
        #
        # NOTE: the load step now runs 100 VUs / 2 min (was 1000 / 6 min) to cap
        # staging Firestore read-ops cost.  The p90 gate stays valid (it sits
        # below the scale-up tail); it just sees a smaller scale-up burst now.
        #
        # WATCH: if p90 starts creeping back toward the gate, check
        # rate(redis_set_json_failures_total{key_prefix="user_context"}) on
        # the staging service — a non-zero rate means a user_context cache
        # write is failing schema validation (the load-test seed wrote a
        # nested {role, granted_at} map there in May 2026 and bypassed the
        # cache entirely until commit fixing the seed shape).
        #
        # See follow-up: tighten gate toward the product target as staging
        # capacity allows.
        uv run python tests/load_test/check_p95_threshold.py \
          tests/load_test/.results/chat_sidebar_stats.csv \
          --percentile 90 \
          --threshold-ms 15000 \
          --max-failure-ratio 0.01 \
          --endpoint "/api/v1/chat/conversations"
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'

  # Export Load Test Results to GCS
  - name: gcr.io/cloud-builders/gcloud
    id: export-results-to-gcs
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        export _TIMESTAMP=$(date +%Y%m%d-%H%M%S)
        gsutil -m cp -r tests/load_test/.results gs://${_BUCKET_NAME_LOAD_TEST_RESULTS}/results-$${_TIMESTAMP}
        echo "_________________________________________________________________________"
        echo "Load test results copied to gs://${_BUCKET_NAME_LOAD_TEST_RESULTS}/results-$${_TIMESTAMP}"
        echo "HTTP link: https://console.cloud.google.com/storage/browser/${_BUCKET_NAME_LOAD_TEST_RESULTS}/results-$${_TIMESTAMP}"
        echo "_________________________________________________________________________"

  # Trigger Prod Deployment
  # AH-156: gated — stale staging builds must not queue prod-trigger fan-outs.
  - name: gcr.io/cloud-builders/gcloud
    id: trigger-prod-deployment
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        if [ "$(cat /workspace/proceed_with_deploy.flag 2>/dev/null)" != "true" ]; then
          echo "[AH-156] tip-commit-guard: superseded — skipping trigger-prod-deployment"
          exit 0
        fi
        gcloud beta builds triggers run deploy-to-prod-pipeline \
          --region ${LOCATION} \
          --project ${PROJECT_ID} \
          --sha ${COMMIT_SHA}

  - name: gcr.io/cloud-builders/gcloud
    id: echo-view-build-trigger-link
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        echo "_________________________________________________________________________"
        echo "Production deployment triggered. View progress and / or approve on the Cloud Build Console:"
        echo "https://console.cloud.google.com/cloud-build/builds;region=$LOCATION"
        echo "_________________________________________________________________________"

  - name: "gcr.io/cloud-builders/docker"
    id: build-react-image
    args:
      - build
      - "-t"
      - "gcr.io/${PROJECT_ID}/kene-frontend-staging:${COMMIT_SHA}"
      - "-f"
      - "frontend/Dockerfile"
      - "--build-arg"
      - "VITE_FIREBASE_API_KEY=${_VITE_FIREBASE_API_KEY}"
      - "--build-arg"
      - "VITE_FIREBASE_AUTH_DOMAIN=${_VITE_FIREBASE_AUTH_DOMAIN}"
      - "--build-arg"
      - "VITE_FIREBASE_PROJECT_ID=${_VITE_FIREBASE_PROJECT_ID_STAGING}"
      - "--build-arg"
      - "VITE_FIREBASE_STORAGE_BUCKET=${_VITE_FIREBASE_STORAGE_BUCKET_STAGING}"
      - "--build-arg"
      - "VITE_FIREBASE_MESSAGING_SENDER_ID=${_VITE_FIREBASE_MESSAGING_SENDER_ID_STAGING}"
      - "--build-arg"
      - "VITE_FIREBASE_APP_ID=${_VITE_FIREBASE_APP_ID_STAGING}"
      - "--build-arg"
      - "VITE_API_BASE_URL=${_VITE_API_BASE_URL}"
      - "--build-arg"
      - "VITE_RECAPTCHA_SITE_KEY=${_RECAPTCHA_SITE_KEY_STAGING}"
      - "--build-arg"
      - "VITE_ENVIRONMENT=staging"
      - "./frontend"

  - name: "gcr.io/cloud-builders/docker"
    id: push-react-image
    args:
      - push
      - "gcr.io/${PROJECT_ID}/kene-frontend-staging:${COMMIT_SHA}"

  # AH-156: gated — stale staging builds must not deploy to the frontend service.
  - name: "gcr.io/cloud-builders/gcloud"
    id: deploy-react-cloud-run
    waitFor: ['push-react-image', 'tip-commit-guard']
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        if [ "$(cat /workspace/proceed_with_deploy.flag 2>/dev/null)" != "true" ]; then
          echo "[AH-156] tip-commit-guard: superseded — skipping deploy-react-cloud-run"
          exit 0
        fi
        gcloud run deploy kene-frontend-staging \
          --image=gcr.io/${PROJECT_ID}/kene-frontend-staging:${COMMIT_SHA} \
          --region=${_REGION} \
          --allow-unauthenticated \
          --memory=1Gi \
          --project=${_STAGING_PROJECT_ID}

  # (API build/deploy chain moved earlier in the file — see the steps right
  # before validate-loadtest-vars.  chat-sidebar-load-test waitFors
  # deploy-api-to-cloud-run, and Cloud Build requires referenced steps to
  # be declared earlier in the file than any step that references them.)

substitutions:
  _STAGING_PROJECT_ID: ken-e-staging
  _BUCKET_NAME_LOAD_TEST_RESULTS: ${PROJECT_ID}-cicd-load-test-results
  _REGION: us-central1
  _NEO4J_DATABASE: neo4j
  _NEO4J_URI: neo4j+s://f7649bfa.databases.neo4j.io
  _NEO4J_USERNAME: neo4j
  _NEO4J_PASSWORD: projects/391472102753/secrets/neo4j-password/versions/latest
  _AURA_INSTANCEID: f7649bfa
  _AURA_INSTANCENAME: KEN-E Staging
  _SUPERSET_BASE_URL: https://superset.ken-e.ai
  _SUPERSET_USERNAME: api
  _SUPERSET_PASSWORD: projects/391472102753/secrets/superset-password/versions/latest
  _VITE_FIREBASE_API_KEY: AIzaSyC2Oxqfs3AxCcggkrS-rZxepvP2onV7lOI
  _VITE_FIREBASE_AUTH_DOMAIN: ken-e-staging.firebaseapp.com
  _VITE_API_BASE_URL: https://kene-api-staging-391472102753.us-central1.run.app
  _API_SERVICE_ACCOUNT_EMAIL: ken-e-api@ken-e-staging.iam.gserviceaccount.com
  # reCAPTCHA site keys are public (shipped in the JS bundle), so we inline the
  # value rather than passing a Secret Manager path. The frontend Vite build has
  # no Secret Manager resolver — passing a path would bake the literal string
  # "projects/.../secrets/recaptcha-site-key/versions/latest" into the bundle as
  # the site key. The companion secret key (`_RECAPTCHA_SECRET_KEY_STAGING`)
  # stays a path because the API resolves it at runtime via shared/secrets.py.
  _RECAPTCHA_SITE_KEY_STAGING: 6LexnYgrAAAAANIsI2_FTaIeBvTvUnc8cWg7exTw
  _RECAPTCHA_SECRET_KEY_STAGING: projects/391472102753/secrets/recaptcha-secret-key/versions/latest
  _VERTEX_AI_LOCATION: us-central1
  _VERTEX_AI_AGENT_ENGINE_ID_STAGING: projects/ken-e-staging/locations/us-central1/reasoningEngines/98331523895263232
  # WARNING: this default is self-referential. The trigger MUST override
  # _REDIS_HOST_STAGING (set in deployment/terraform/build_triggers.tf as
  # google_redis_instance.staging.host) or Cloud Build fails with "cycle in
  # evaluating substitutions" before the build can start. Do not remove the
  # trigger override without first replacing this default with a real value.
  _REDIS_HOST_STAGING: ${_REDIS_HOST_STAGING}
  _REDIS_PORT: "6379"
  _REDIS_DB: "0"
  _SENDGRID_API_KEY_STAGING: projects/391472102753/secrets/sendgrid-api-key/versions/latest

  # Agent Engine IDs (deployed separately to staging project)
  _KEN_E_ENGINE_ID_STAGING: projects/391472102753/secrets/ken-e-engine-id/versions/latest
  _STRATEGY_SUPERVISOR_ENGINE_ID_STAGING: projects/391472102753/secrets/strategy-supervisor-engine-id/versions/latest

  # OAuth Configuration (environment-specific)
  _ENCRYPTION_KEY_STAGING: projects/391472102753/secrets/ENCRYPTION_KEY/versions/latest
  _GOOGLE_OAUTH_CLIENT_ID_STAGING: projects/391472102753/secrets/GOOGLE_OAUTH_CLIENT_ID/versions/latest
  _GOOGLE_OAUTH_CLIENT_SECRET_STAGING: projects/391472102753/secrets/GOOGLE_OAUTH_CLIENT_SECRET/versions/latest

  # OpenAI (for strategy formatters)
  _OPENAI_API_KEY_STAGING: projects/391472102753/secrets/OPENAI_API_KEY/versions/latest

  # Weights & Biases / Weave (CRITICAL for agent observability)
  _WANDB_API_KEY_STAGING: projects/391472102753/secrets/wandb_api_key/versions/latest

  # Firebase Configuration for Frontend Build
  _VITE_FIREBASE_PROJECT_ID_STAGING: ken-e-staging
  _VITE_FIREBASE_STORAGE_BUCKET_STAGING: ken-e-staging.firebasestorage.app
  _VITE_FIREBASE_MESSAGING_SENDER_ID_STAGING: "391472102753"
  _VITE_FIREBASE_APP_ID_STAGING: "1:391472102753:web:YOUR_STAGING_APP_ID"

  # Chat sidebar load test
  _CHAT_LOADTEST_UID: ''

  # Chat internal OIDC auth (CH-PRD-05 / CH-51).
  # CHAT_INTERNAL_SA_ALLOWLIST: comma-separated service-account emails permitted to call
  # internal chat endpoints. Includes the orphan-scan scheduler SA and the ADK-callback
  # SA. The ADK-callback SA is the Agent Engine runtime identity (the default AI Platform
  # Reasoning Engine service agent, since the engine has no custom SA) — its OIDC token is
  # what app/adk/agents/chat_callbacks.py posts to /internal/chat/side-table/update.
  # NOTE: confirm this exact email against the 403 "OIDC caller ... not in allowlist" log
  # after the first real callback turn; correct if the runtime SA differs.
  # The SAs are comma-joined below; the deploy step's --set-env-vars uses a "^;^" custom
  # delimiter so these commas stay part of the value rather than splitting key=value pairs.
  # Do NOT introduce a ';' into any value in that env string.
  _CHAT_INTERNAL_SA_ALLOWLIST_STAGING: 'chat-orphan-scan-scheduler@ken-e-staging.iam.gserviceaccount.com,service-391472102753@gcp-sa-aiplatform-re.iam.gserviceaccount.com'
  _STAGING_API_URL: https://kene-api-staging-391472102753.us-central1.run.app
  # Firebase Admin SDK SA that the load-test step impersonates to sign
  # custom tokens for the staging project.  cicd-runner@ken-e-cicd holds
  # roles/iam.serviceAccountTokenCreator on this SA.
  _FIREBASE_ADMIN_SA_EMAIL_STAGING: firebase-adminsdk-fbsvc@ken-e-staging.iam.gserviceaccount.com

logsBucket: gs://${PROJECT_ID}-logs-data/build-logs
options:
  substitutionOption: ALLOW_LOOSE
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET

# availableSecrets section removed - API now uses Application Default Credentials
