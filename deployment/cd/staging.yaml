steps:
  - name: "python:3.11-slim"
    id: deploy-data-ingestion-pipeline-staging
    entrypoint: bash
    args:
      - -c
      - |
        cd data_ingestion && pip install uv --user && uv sync --frozen && \
        uv run python data_ingestion_pipeline/submit_pipeline.py
    env:
      - "PIPELINE_ROOT=${_PIPELINE_GCS_ROOT}"
      - "REGION=${_REGION}"
      - "DATA_STORE_REGION=${_DATA_STORE_REGION}"
      - "DATA_STORE_ID=${_DATA_STORE_ID}"
      - "PROJECT_ID=${_STAGING_PROJECT_ID}"
      - "SERVICE_ACCOUNT=${_PIPELINE_SA_EMAIL}"
      - "PIPELINE_NAME=${_PIPELINE_NAME}"
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'
      
  - name: "python:3.11-slim" 
    id: install-dependencies
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        pip install uv --user && uv sync --frozen
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'

  # CrewAI deployment removed - using ADK Agent Engine ID directly in API

  # Deploy Strategy Supervisor Agent to Staging
  # This must happen BEFORE API deployment so API gets the fresh engine ID
  - name: "python:3.12-slim"
    id: deploy-strategy-supervisor-staging
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        cd app/adk
        pip install uv --user
        uv sync --frozen
        uv run python deploy_with_sys_version.py --env staging
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'
      - 'GOOGLE_CLOUD_PROJECT=${_STAGING_PROJECT_ID}'
      - 'WANDB_API_KEY=${_WANDB_API_KEY_STAGING}'
      - 'WANDB_ENTITY=ken-e'
      - 'WANDB_PROJECT=ken-e-strategy-agent-staging'
      - 'WEAVE_PROJECT_NAME=ken-e-strategy-agent-staging'

  # Deploy KEN-E Chat Agent to Staging
  # This must happen BEFORE API deployment so API gets the fresh engine ID
  - name: "python:3.12-slim"
    id: deploy-ken-e-agent-staging
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        cd app/adk
        uv run python deploy_ken_e.py --env staging
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'
      - 'GOOGLE_CLOUD_PROJECT=${_STAGING_PROJECT_ID}'
      - 'WANDB_API_KEY=${_WANDB_API_KEY_STAGING}'
      - 'WANDB_ENTITY=ken-e'
      - 'WANDB_PROJECT=ken-e-strategy-agent-staging'
      - 'WEAVE_PROJECT_NAME=ken-e-strategy-agent-staging'

  - name: gcr.io/cloud-builders/gcloud
    id: fetch-auth-token
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        echo $(gcloud auth print-access-token -q) > auth_token.txt

  # Load Testing
  - name: "python:3.11-slim"
    id: load_test
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        export _AUTH_TOKEN=$(cat auth_token.txt)
        uv add locust==2.32.6 gevent==24.11.1
        uv run locust -f tests/load_test/load_test.py \
        --headless \
        -t 15s -u 1 -r 0.25 \
        --csv=tests/load_test/.results/results \
        --html=tests/load_test/.results/report.html
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'

  # Export Load Test Results to GCS
  - name: gcr.io/cloud-builders/gcloud
    id: export-results-to-gcs
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        export _TIMESTAMP=$(date +%Y%m%d-%H%M%S)
        gsutil -m cp -r tests/load_test/.results gs://${_BUCKET_NAME_LOAD_TEST_RESULTS}/results-$${_TIMESTAMP}
        echo "_________________________________________________________________________"
        echo "Load test results copied to gs://${_BUCKET_NAME_LOAD_TEST_RESULTS}/results-$${_TIMESTAMP}"
        echo "HTTP link: https://console.cloud.google.com/storage/browser/${_BUCKET_NAME_LOAD_TEST_RESULTS}/results-$${_TIMESTAMP}"
        echo "_________________________________________________________________________"

  # Trigger Prod Deployment
  - name: gcr.io/cloud-builders/gcloud
    id: trigger-prod-deployment
    entrypoint: gcloud
    args:
      - "beta"
      - "builds"
      - "triggers"
      - "run"
      - "deploy-to-prod-pipeline"
      - "--region"
      - "$LOCATION"
      - "--project"
      - "$PROJECT_ID"
      - "--sha"
      - $COMMIT_SHA

  - name: gcr.io/cloud-builders/gcloud
    id: echo-view-build-trigger-link
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        echo "_________________________________________________________________________"
        echo "Production deployment triggered. View progress and / or approve on the Cloud Build Console:"
        echo "https://console.cloud.google.com/cloud-build/builds;region=$LOCATION"
        echo "_________________________________________________________________________"

  - name: "gcr.io/cloud-builders/docker"
    id: build-react-image
    args:
      - build
      - "-t"
      - "gcr.io/${PROJECT_ID}/kene-frontend-staging:${COMMIT_SHA}"
      - "-f"
      - "frontend/Dockerfile"
      - "--build-arg"
      - "VITE_FIREBASE_API_KEY=${_VITE_FIREBASE_API_KEY}"
      - "--build-arg"
      - "VITE_FIREBASE_AUTH_DOMAIN=${_VITE_FIREBASE_AUTH_DOMAIN}"
      - "--build-arg"
      - "VITE_FIREBASE_PROJECT_ID=${_VITE_FIREBASE_PROJECT_ID_STAGING}"
      - "--build-arg"
      - "VITE_FIREBASE_STORAGE_BUCKET=${_VITE_FIREBASE_STORAGE_BUCKET_STAGING}"
      - "--build-arg"
      - "VITE_FIREBASE_MESSAGING_SENDER_ID=${_VITE_FIREBASE_MESSAGING_SENDER_ID_STAGING}"
      - "--build-arg"
      - "VITE_FIREBASE_APP_ID=${_VITE_FIREBASE_APP_ID_STAGING}"
      - "--build-arg"
      - "VITE_API_BASE_URL=${_VITE_API_BASE_URL}"
      - "--build-arg"
      - "VITE_RECAPTCHA_SITE_KEY=${_RECAPTCHA_SITE_KEY_STAGING}"
      - "--build-arg"
      - "VITE_ENVIRONMENT=staging"
      - "./frontend"

  - name: "gcr.io/cloud-builders/docker"
    id: push-react-image
    args:
      - push
      - "gcr.io/${PROJECT_ID}/kene-frontend-staging:${COMMIT_SHA}"

  - name: "gcr.io/cloud-builders/gcloud"
    id: deploy-react-cloud-run
    args:
      - "run"
      - "deploy"
      - "kene-frontend-staging"
      - "--image=gcr.io/${PROJECT_ID}/kene-frontend-staging:${COMMIT_SHA}"
      - "--region=${_REGION}"
      - "--allow-unauthenticated"
      - "--memory=1Gi"
      - "--project=${_STAGING_PROJECT_ID}"

  # Copy shared package into api directory so Dockerfile can access it
  - name: "gcr.io/cloud-builders/gcloud"
    id: copy-shared-to-api
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        cp -r shared api/shared
        echo "Copied shared/ package into api/ directory"

  - name: "gcr.io/cloud-builders/docker"
    id: build-api-image
    dir: api
    args:
      - build
      - "-t"
      - "gcr.io/${PROJECT_ID}/kene-api-staging:${COMMIT_SHA}"
      - "-f"
      - "Dockerfile"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    id: push-api-image
    args:
      - push
      - "gcr.io/${PROJECT_ID}/kene-api-staging:${COMMIT_SHA}"

  - name: "gcr.io/cloud-builders/gcloud"
    id: deploy-api-to-cloud-run
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
          set -e
          set -x

          echo "Deploying Cloud Run service with attached service account and VPC connector..."
          gcloud run deploy kene-api-staging \
            --image=gcr.io/${PROJECT_ID}/kene-api-staging:${COMMIT_SHA} \
            --region=${_REGION} \
            --platform=managed \
            --project=${_STAGING_PROJECT_ID} \
            --allow-unauthenticated \
            --memory=1Gi \
            --port=8000 \
            --timeout=300 \
            --cpu-boost \
            --service-account=${_API_SERVICE_ACCOUNT_EMAIL} \
            --vpc-connector=ken-e-staging-connector \
            --clear-secrets \
            --set-env-vars "DEBUG=false,HOST=0.0.0.0,ENVIRONMENT=staging,NEO4J_URI=${_NEO4J_URI},NEO4J_USERNAME=${_NEO4J_USERNAME},NEO4J_PASSWORD=${_NEO4J_PASSWORD},NEO4J_DATABASE=${_NEO4J_DATABASE},AURA_INSTANCEID=${_AURA_INSTANCEID},AURA_INSTANCENAME=${_AURA_INSTANCENAME},SUPERSET_BASE_URL=${_SUPERSET_BASE_URL},SUPERSET_USERNAME=${_SUPERSET_USERNAME},SUPERSET_PASSWORD=${_SUPERSET_PASSWORD},GOOGLE_CLOUD_PROJECT_ID=${_STAGING_PROJECT_ID},FIRESTORE_DATABASE_ID=(default),LOG_LEVEL=INFO,USE_APPLICATION_DEFAULT_CREDENTIALS=true,RECAPTCHA_SITE_KEY=${_RECAPTCHA_SITE_KEY_STAGING},RECAPTCHA_SECRET_KEY=${_RECAPTCHA_SECRET_KEY_STAGING},VERTEX_AI_LOCATION=${_VERTEX_AI_LOCATION},VERTEX_AI_AGENT_ENGINE_ID=${_VERTEX_AI_AGENT_ENGINE_ID_STAGING},REDIS_HOST=${_REDIS_HOST_STAGING},REDIS_PORT=${_REDIS_PORT},REDIS_DB=${_REDIS_DB},SUPPRESS_REDIS_WARNING=false,SENDGRID_API_KEY=${_SENDGRID_API_KEY_STAGING},APP_BASE_URL=https://staging.app.ken-e.ai,EMAIL_FROM_ADDRESS=noreply@ken-e.ai,EMAIL_FROM_NAME=KEN-E Team,KEN_E_ENGINE_ID=${_KEN_E_ENGINE_ID_STAGING},STRATEGY_SUPERVISOR_ENGINE_ID=${_STRATEGY_SUPERVISOR_ENGINE_ID_STAGING},ENCRYPTION_KEY=${_ENCRYPTION_KEY_STAGING},GOOGLE_OAUTH_CLIENT_ID=${_GOOGLE_OAUTH_CLIENT_ID_STAGING},GOOGLE_OAUTH_CLIENT_SECRET=${_GOOGLE_OAUTH_CLIENT_SECRET_STAGING},GOOGLE_OAUTH_REDIRECT_URI=https://kene-api-staging-391472102753.us-central1.run.app/api/oauth/callback/google,FRONTEND_URL=https://staging.app.ken-e.ai,CORS_ORIGINS=https://staging.app.ken-e.ai,OPENAI_API_KEY=${_OPENAI_API_KEY_STAGING},WANDB_API_KEY=${_WANDB_API_KEY_STAGING},WANDB_PROJECT=ken-e-strategy-agent-staging,WANDB_ENTITY=ken-e,WEAVE_PROJECT_NAME=ken-e-strategy-agent-staging,VERTEX_AI_PROJECT_ID=${_STAGING_PROJECT_ID}"



